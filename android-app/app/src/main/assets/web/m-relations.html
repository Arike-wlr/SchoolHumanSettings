<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3d2b1f">
<title>关系网</title>
<script>
if (location.protocol === 'file:') {
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('a[href]').forEach(function(a) {
      var h = a.getAttribute('href');
      var map = {'/m':'m-index.html','/m/worldview':'m-worldview.html','/m/relations':'m-relations.html','/m/documents':'m-documents.html'};
      if (map[h]) a.href = map[h];
    });
  });
}
</script>
<style>
  :root {
    --bg: #f5f0eb; --card-bg: #fffef9; --text: #3d322b; --text-light: #8c7b6e;
    --accent: #8b5e3c; --accent-light: #c49a6c; --accent-pale: #f0e4d4;
    --danger: #c0392b; --danger-bg: #fce4e4; --border: #e0d5c7;
    --shadow: 0 2px 12px rgba(60,40,20,.06); --radius: 12px;
    --font-serif: 'Georgia', 'Noto Serif SC', serif;
    --font-sans: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: calc(64px + var(--safe-bottom)); -webkit-font-smoothing: antialiased; }

  .header { background: linear-gradient(135deg, #3d2b1f 0%, #5a3e2b 50%, #7a5543 100%); color: #f5ede4; padding: 16px; padding-top: max(16px, env(safe-area-inset-top, 0px)); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.15); }
  .header h1 { font-family: var(--font-serif); font-size: 1.15rem; font-weight: 500; }
  .header .subtitle { font-size: .72rem; opacity: .65; margin-top: 2px; }

  .toolbar { padding: 12px 14px 8px; display: flex; align-items: center; gap: 8px; }
  .count { font-size: .82rem; color: var(--text-light); flex-shrink: 0; }
  .count strong { color: var(--accent); font-weight: 600; }
  .search-wrap { flex: 1; position: relative; display: flex; align-items: center; }
  .search-icon { position: absolute; left: 10px; font-size: .9rem; opacity: .5; pointer-events: none; }
  .search-input { width: 100%; padding: 8px 32px 8px 30px; border: 1px solid var(--border); border-radius: 20px; font-size: .88rem; background: var(--card-bg); color: var(--text); outline: none; }
  .search-input:focus { border-color: var(--accent-light); }
  .clear-btn { position: absolute; right: 8px; background: none; border: none; color: var(--text-light); font-size: .85rem; padding: 4px 8px; cursor: pointer; display: none; }
  .search-wrap.has-value .clear-btn { display: block; }

  .btn-add { display: block; width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: .95rem; font-weight: 500; cursor: pointer; box-shadow: 0 2px 8px rgba(139,94,60,.25); }
  .btn-add:active { transform: scale(.98); }
  .btn-fam { display: block; width: 100%; padding: 12px; background: #fff; color: var(--accent); border: 1.5px solid var(--accent); border-radius: var(--radius); font-size: .95rem; font-weight: 500; cursor: pointer; }
  .btn-fam:active { transform: scale(.98); background: rgba(139,94,60,.08); }
  .action-bar { display: flex; gap: 8px; margin: 4px 14px 8px; }
  .action-bar > button { flex: 1; margin: 0; width: auto; }
  .fam-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .fam-row:last-child { border-bottom: none; }
  .fam-row-name { min-width: 70px; font-weight: 600; font-size: .9rem; color: var(--text); flex-shrink: 0; }
  .fam-row-input { flex: 1; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .85rem; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .fam-row-input:focus { outline: none; border-color: var(--accent-light); }
  .fam-dots { display: flex; gap: 2px; flex-shrink: 0; min-width: 24px; }
  .fam-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

  /* ====== 关系图 Canvas ====== */
  .graph-section { margin: 4px 14px 12px; background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .graph-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .graph-title { font-size: .9rem; font-weight: 600; }
  .graph-hint { font-size: .7rem; color: var(--text-light); }
  .graph-canvas-wrap { position: relative; height: 280px; background: linear-gradient(180deg, #faf6f0 0%, #f0e8db 100%); touch-action: none; }
  .graph-canvas-wrap canvas { display: block; width: 100%; height: 100%; }
  .graph-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--text-light); font-size: .82rem; pointer-events: none; }
  .graph-controls { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 4px; }
  .graph-btn { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,.9); border: 1px solid var(--border); color: var(--accent); font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
  .graph-btn:active { background: var(--accent-pale); }

  .card-list { padding: 4px 14px 20px; display: flex; flex-direction: column; gap: 10px; }
  .rel-card { background: var(--card-bg); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); }
  .rel-names { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .rel-name { font-size: .95rem; font-weight: 600; }
  .rel-arrow { color: var(--accent); font-size: .9rem; }
  .rel-type { font-size: .72rem; padding: 2px 8px; border-radius: 10px; background: var(--accent-pale); color: var(--accent); font-weight: 500; }
  .rel-type.cp { background: #fce4ec; color: #c2185b; }
  .rel-type.师生 { background: #e3f2fd; color: #1565c0; }
  .rel-type.朋友 { background: #e8f8e0; color: #2e7d32; }
  .rel-type.冤家 { background: #fdf0e0; color: #d4842a; }
  .rel-type.亲属 { background: #e8f8e0; color: #2ecc71; }
  .rel-desc { font-size: .85rem; color: var(--text-light); line-height: 1.5; margin-top: 4px; white-space: pre-wrap; }
  .card-actions { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .btn-action { flex: 1; padding: 7px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text); font-size: .82rem; cursor: pointer; }
  .btn-action:active { background: var(--accent-pale); }
  .btn-action.danger { color: var(--danger); border-color: var(--danger-bg); }

  /* 上移/下移按钮 */
  .sort-btn { display: flex; align-items: center; justify-content: center; width: 34px; min-width: 34px; height: 34px; background: none; border: 1.5px solid var(--border); border-radius: 8px; color: var(--text-light); font-size: 1.05rem; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; padding: 0; line-height: 1; }
  .sort-btn:active { background: var(--accent-pale); color: var(--accent); border-color: var(--accent); }
  .export-mode .sort-btn { display: none; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-light); }
  .empty .icon { font-size: 2.5rem; margin-bottom: 8px; opacity: .5; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .no-result { text-align: center; padding: 40px 20px; color: var(--text-light); font-size: .88rem; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, #2a1a12 0%, #1a0e08 100%); display: flex; padding-bottom: var(--safe-bottom); box-shadow: 0 -2px 12px rgba(0,0,0,.15); z-index: 200; }
  .nav-item { flex: 1; padding: 10px 4px 8px; text-align: center; color: #8c7b6e; text-decoration: none; }
  .nav-item.active { color: #c49a6c; }
  .nav-icon { font-size: 1.3rem; display: block; }
  .nav-text { font-size: .68rem; margin-top: 2px; }

  .modal-overlay { position: fixed; inset: 0; background: var(--card-bg); z-index: 300; display: none; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--card-bg); width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
  .modal-header { padding: 14px 16px; padding-top: calc(32px + var(--safe-top)); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--card-bg); z-index: 2; }
  .modal-title { font-size: 1rem; font-weight: 600; }
  .modal-close { background: none; border: none; font-size: 1.2rem; color: var(--text-light); padding: 4px 8px; cursor: pointer; }
  .modal-body { padding: 14px 16px 24px; padding-bottom: 60vh; }
  .modal-footer { padding: 12px 16px calc(12px + var(--safe-bottom)); border-top: 1px solid var(--border); display: flex; gap: 10px; position: sticky; bottom: 0; background: var(--card-bg); z-index: 2; }
  .btn-modal { flex: 1; padding: 12px; border: none; border-radius: var(--radius); font-size: .92rem; font-weight: 500; cursor: pointer; }
  .btn-modal.primary { background: var(--accent); color: #fff; }
  .btn-modal.cancel { background: var(--accent-pale); color: var(--text); }
  .btn-modal.danger { background: var(--danger); color: #fff; }

  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: .82rem; color: var(--text-light); margin-bottom: 5px; }
  .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: .92rem; background: var(--bg); color: var(--text); outline: none; font-family: inherit; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent-light); background: var(--card-bg); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-textarea.large { min-height: 200px; }

  .toast { position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); background: rgba(60,40,20,.92); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: .85rem; z-index: 400; opacity: 0; transition: opacity .3s; pointer-events: none; max-width: 90%; text-align: center; }
  .toast.show { opacity: 1; }
  .toast.error { background: rgba(192,57,43,.92); }
  .toast.success { background: rgba(39,124,79,.92); }

  /* ====== 导出模式 ====== */
  .card-check { display: none; position: absolute; top:12px; left:12px; width:28px; height:28px; cursor:pointer; accent-color:var(--accent); z-index:2; }
  .export-mode .card-check { display: block; }
  .export-mode .card, .export-mode .rel-card { cursor: default; }
  .export-mode .card:active, .export-mode .rel-card:active { transform: none; }
  .card.selected, .rel-card.selected { border-color: var(--accent); background: var(--accent-pale); }
  .export-bar { display: none; gap: 8px; margin: 6px 14px 0; align-items: center; }
  .export-mode .export-bar { display: flex; }
  .btn-export-outline { padding:8px 14px; background:var(--card-bg); color:var(--text); border:1px solid var(--border); border-radius:8px; font-size:.82rem; cursor:pointer; }
  .btn-export-primary { flex:1; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-size:.95rem; font-weight:500; cursor:pointer; margin:0; box-shadow:0 2px 8px rgba(139,94,60,.25); }
  .btn-export-primary:disabled { opacity:.5; cursor:default; }
  .btn-export-trigger { display:block; width:calc(100% - 28px); margin:6px 14px 8px; padding:12px; background:var(--card-bg); color:var(--accent); border:1.5px solid var(--accent); border-radius:var(--radius); font-size:.95rem; font-weight:500; cursor:pointer; box-shadow:none; }
  .btn-export-trigger:active { background:var(--accent-pale); }
  .export-mode .btn-export-trigger { display: none; }
</style>
</head>
<body>

<header class="header">
  <h1>关系网</h1>
  <p class="subtitle">角色之间的关系</p>
</header>

<div class="toolbar">
  <span class="count">共 <strong id="relCount">…</strong> 条</span>
  <div class="search-wrap" id="searchWrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="搜索角色名…" oninput="onSearch()">
    <button class="clear-btn" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="action-bar">
  <button class="btn-add" onclick="openCreateModal()">＋ 添加关系</button>
  <button class="btn-fam" onclick="openFamilyModal()">🏛 家族</button>
</div>

<div class="export-bar" id="exportActions">
  <button class="btn-export-outline" onclick="toggleSelectAll()">全选</button>
  <button class="btn-export-outline" onclick="cancelExport()" style="color:var(--text-light);">放弃</button>
  <button class="btn-export-primary" id="confirmExportBtn" onclick="confirmExport()" disabled>确认导出</button>
</div>
<button class="btn-export-trigger" id="exportBtn" onclick="enterExportMode()">📥 选择导出</button>

<!-- 关系图可视化 -->
<div class="graph-section">
  <div class="graph-header">
    <span class="graph-title">关系图</span>
    <span class="graph-hint">拖动节点 · 双指缩放</span>
  </div>
  <div class="graph-canvas-wrap" id="canvasWrap">
    <canvas id="graphCanvas"></canvas>
    <div class="graph-empty" id="graphEmpty">添加角色和关系后显示关系图</div>
    <div class="graph-controls">
      <button class="graph-btn" onclick="graphZoom(1.2)">+</button>
      <button class="graph-btn" onclick="graphZoom(0.8)">−</button>
      <button class="graph-btn" onclick="graphReset()" style="font-size:.75rem;">↺</button>
    </div>
  </div>
</div>

<div class="card-list" id="relList"></div>
<div class="no-result" id="noResult" style="display:none;">未找到匹配的关系</div>
<div class="empty" id="loadingState" style="display:block;">
  <div class="icon" style="animation:spin 1s linear infinite;">⏳</div>
  <p>加载中…</p>
</div>
<div class="empty" id="emptyState" style="display:none;">
  <div class="icon">🔗</div>
  <p>还没有关系</p>
</div>

<!-- 添加/编辑 Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">添加关系</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="relForm" onsubmit="submitForm(event)">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label class="form-label">角色 A *</label>
          <select class="form-select" id="fromChar" required></select>
        </div>
        <div class="form-group">
          <label class="form-label">角色 B *</label>
          <select class="form-select" id="toChar" required></select>
        </div>
        <div class="form-group">
          <label class="form-label">关系类型</label>
          <input type="text" class="form-input" id="relType" placeholder="如：朋友、CP、师生、冤家" list="typeList">
          <datalist id="typeList">
            <option value="朋友">
            <option value="CP">
            <option value="单箭头">
            <option value="师生">
            <option value="冤家">
            <option value="继承记忆">
            <option value="参与组建">
            <option value="亲属">
          </datalist>
        </div>
        <div class="form-group">
          <label class="form-label">关系描述</label>
          <textarea class="form-textarea large" id="relDesc" rows="6" placeholder="关系详细说明…"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-modal cancel" onclick="closeModal()">取消</button>
      <button class="btn-modal primary" onclick="document.getElementById('relForm').requestSubmit()" id="submitBtn">确认添加</button>
    </div>
  </div>
</div>

<!-- 删除确认 -->
<div class="modal-overlay" id="deleteOverlay">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <span class="modal-title">确认删除</span>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <div class="modal-body" style="text-align:center;padding:24px 16px;">
      <p style="margin-bottom:8px;">确定要删除</p>
      <p style="font-size:1rem;font-weight:600;color:var(--danger);" id="deleteRelInfo"></p>
      <p style="margin-top:8px;color:var(--text-light);font-size:.85rem;">此操作不可撤销</p>
    </div>
    <div class="modal-footer">
      <button class="btn-modal cancel" onclick="closeDeleteModal()">取消</button>
      <button class="btn-modal danger" onclick="confirmDelete()">删除</button>
    </div>
  </div>
</div>

<!-- 家族管理 Modal -->
<div class="modal-overlay" id="familyOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🏛 管理家族</span>
      <button class="modal-close" onclick="closeFamilyModal()">✕</button>
    </div>
    <div class="modal-body" id="familyBody"></div>
    <div class="modal-footer">
      <button class="btn-modal cancel" onclick="closeFamilyModal()">取消</button>
      <button class="btn-modal primary" onclick="saveFamilies()">保存</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="/m" class="nav-item"><span class="nav-icon">📖</span><span class="nav-text">角色</span></a>
  <a href="/m/worldview" class="nav-item"><span class="nav-icon">🌍</span><span class="nav-text">世界观</span></a>
  <a href="/m/relations" class="nav-item active"><span class="nav-icon">🔗</span><span class="nav-text">关系网</span></a>
  <a href="/m/documents" class="nav-item"><span class="nav-icon">📄</span><span class="nav-text">文档</span></a>
</nav>

<div class="toast" id="toast"></div>

<script>
const API_REL = '/api/relations';

const API_CHAR = '/api/characters';
let allRelations = [];
let allCharacters = [];
let deleteTargetId = null;
let selectedIds = new Set();
let exportMode = false;

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ============================================================
// 家族管理
// ============================================================
let familyEditMap = {};

function openFamilyModal() {
  // 同步当前家族到编辑缓存
  familyEditMap = {};
  allCharacters.forEach(c => { familyEditMap[c.id] = c.family || ''; });

  // 收集已有家族作为建议
  const allFams = new Set();
  allCharacters.forEach(c => splitFamilies(c.family).forEach(f => allFams.add(f)));
  const datalistOpts = [...allFams].map(f => `<option value="${esc(f)}">`).join('');

  const body = document.getElementById('familyBody');
  if (allCharacters.length === 0) {
    body.innerHTML = '<p style="text-align:center;color:var(--text-light);padding:20px;">先添加角色才能管理家族</p>';
  } else {
    body.innerHTML = allCharacters.map(c => {
      const fams = splitFamilies(c.family);
      const dots = fams.map(f =>
        `<span class="fam-dot" style="background:${gFamilyColorMap[f] || '#ccc'}" title="${esc(f)}"></span>`
      ).join('');
      return `
      <div class="fam-row">
        <span class="fam-row-name">${esc(c.name)}</span>
        <input type="text" class="fam-row-input" data-char-id="${c.id}"
               value="${esc(c.family || '')}" placeholder="多个用、分隔"
               list="famSuggest_${c.id}">
        <datalist id="famSuggest_${c.id}">${datalistOpts}</datalist>
        <span class="fam-dots">${dots}</span>
      </div>`;
    }).join('');

    // 绑定 input 事件
    body.querySelectorAll('.fam-row-input').forEach(input => {
      input.addEventListener('input', function() {
        familyEditMap[parseInt(this.dataset.charId)] = this.value.trim();
      });
    });
  }

  document.getElementById('familyOverlay').style.display = 'flex';
}

function closeFamilyModal() {
  document.getElementById('familyOverlay').style.display = 'none';
}

async function saveFamilies() {
  let success = 0, fail = 0;
  for (const charId in familyEditMap) {
    const newFamily = familyEditMap[charId].trim();
    const char = allCharacters.find(c => c.id === parseInt(charId));
    if (!char || (char.family || '').trim() === newFamily) continue;
    try {
      const res = await fetch(`${API_CHAR}/${charId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ family: newFamily }),
      });
      if (res.ok) { char.family = newFamily; success++; }
      else fail++;
    } catch(e) { fail++; }
  }
  closeFamilyModal();
  buildFamilyColors();
  graphInit();
  renderRelList();
  showToast(`家族更新：${success} 成功${fail ? '，' + fail + ' 失败' : ''}`, fail ? 'error' : 'success');
}

document.addEventListener('DOMContentLoaded', () => {
  // 点击 overlay 背景关闭家族 modal
  document.getElementById('familyOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeFamilyModal();
  });
  initTouchDrag();
  loadData();
});

async function loadData() {
  try {
    const [relRes, charRes] = await Promise.all([fetch(API_REL), fetch(API_CHAR)]);
    allRelations = await relRes.json();
    allCharacters = await charRes.json();
    document.getElementById('loadingState').style.display = 'none';
    renderRelList();
    graphInit();
  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    showToast('加载失败', 'error');
  }
}

function renderRelList() {
  const list = document.getElementById('relList');
  const empty = document.getElementById('emptyState');
  const noResult = document.getElementById('noResult');
  const count = document.getElementById('relCount');
  const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();

  let filtered = allRelations;
  if (searchVal) {
    filtered = allRelations.filter(r => {
      const fromName = (r.from_name||'').toLowerCase();
      const toName = (r.to_name||'').toLowerCase();
      return fromName.includes(searchVal) || toName.includes(searchVal);
    });
  }

  count.textContent = (searchVal ? `${filtered.length}/${allRelations.length}` : allRelations.length);

  if (allRelations.length === 0) {
    list.innerHTML = ''; empty.style.display='block'; noResult.style.display='none'; return;
  }
  empty.style.display = 'none';
  if (filtered.length === 0 && searchVal) { list.innerHTML=''; noResult.style.display='block'; return; }
  noResult.style.display = 'none';

  if (exportMode) updateExportButtons();

  const idxMap = filtered.map(r => allRelations.indexOf(r));
  list.innerHTML = filtered.map((r, i) => {
    const fromName = r.from_name || '角色#' + r.from_char_id;
    const toName = r.to_name || '角色#' + r.to_char_id;
    const typeClass = r.relation_type === 'CP' ? 'cp' : r.relation_type === '师生' ? '师生' : '';
    const typeHtml = r.relation_type ? `<span class="rel-type ${typeClass}">${esc(r.relation_type)}</span>` : '';
    const arrow = (r.relation_type === '朋友' || r.relation_type === '冤家' || r.relation_type === '亲属') ? '⇄' : '→';
    return `
      <div class="rel-card${selectedIds.has(r.id)?' selected':''}" data-drag-id="${r.id}" data-drag-idx="${idxMap[i]}">
        <input type="checkbox" class="card-check" ${selectedIds.has(r.id) ? 'checked' : ''} onclick="event.stopPropagation();toggleCardSelect(${r.id}, this.checked)" title="选择导出">
        <div class="rel-names">
          <button class="sort-btn" title="上移" onclick="event.stopPropagation();moveRelUp(${r.id});return false;">↑</button>
          <button class="sort-btn" title="下移" onclick="event.stopPropagation();moveRelDown(${r.id});return false;">↓</button>
          <span class="rel-name">${esc(fromName)}</span>
          <span class="rel-arrow">${arrow}</span>
          <span class="rel-name">${esc(toName)}</span>
          ${typeHtml}
        </div>
        ${r.description ? `<div class="rel-desc">${esc(r.description)}</div>` : ''}
        <div class="card-actions">
          <button class="btn-action" onclick="openEditModal(${r.id})">编辑</button>
          <button class="btn-action danger" onclick="openDeleteModal(${r.id},'${esc(fromName)} ${arrow} ${esc(toName)}')">删除</button>
        </div>
      </div>`;
  }).join('');
}

function openEditModal(id) {

async function submitForm(e) {
  e.preventDefault();
  const form = document.getElementById('relForm');
  if (!form.checkValidity()) { form.reportValidity(); return; }
  const editId = document.getElementById('editId').value;
  const fromId = parseInt(document.getElementById('fromChar').value);
  const toId = parseInt(document.getElementById('toChar').value);
  if (fromId === toId) { showToast('不能选择同一个角色', 'error'); return; }
  const data = {
    from_char_id: fromId,
    to_char_id: toId,
    relation_type: document.getElementById('relType').value.trim(),
    description: document.getElementById('relDesc').value.trim(),
  };
  try {
    const url = editId ? `${API_REL}/${editId}` : API_REL;
    const method = editId ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || '操作失败'); }
    closeModal();
    loadData();
    showToast(editId ? '已更新' : '已创建', 'success');
  } catch(e) {
    showToast(e.message || '操作失败', 'error');
  }
}

function openDeleteModal(id, info) {

  document.getElementById('deleteRelInfo').textContent = info;
  document.getElementById('deleteOverlay').classList.add('active');
}
function closeDeleteModal() { document.getElementById('deleteOverlay').classList.remove('active'); deleteTargetId = null; }

    showToast('已删除', 'success');

function showToast(msg, type) {

function enterExportMode() {
  exportMode = true;
  selectedIds.clear();
  document.body.classList.add('export-mode');
  renderRelList();
}

function cancelExport() {
  exportMode = false;
  selectedIds.clear();
  document.body.classList.remove('export-mode');
  renderRelList();
}

function toggleCardSelect(id, checked) {
  if (checked) selectedIds.add(id);
  else selectedIds.delete(id);
  var card = document.querySelector('.rel-card[data-drag-id="' + id + '"]');
  if (card) card.classList.toggle('selected', checked);
  updateExportButtons();
}

function toggleSelectAll() {
  var cards = document.querySelectorAll('#relList .rel-card[data-drag-id]');
  if (cards.length === 0) return;
  var visibleIds = [];
  cards.forEach(function(c) { visibleIds.push(parseInt(c.dataset.dragId)); });
  var allSelected = visibleIds.every(function(id) { return selectedIds.has(id); });
  if (allSelected) {
    visibleIds.forEach(function(id) { selectedIds.delete(id); });
  } else {
    visibleIds.forEach(function(id) { selectedIds.add(id); });
  }
  renderRelList();
}

function updateExportButtons() {
  var btn = document.getElementById('confirmExportBtn');
  if (!btn) return;
  btn.disabled = selectedIds.size === 0;
  btn.textContent = selectedIds.size > 0 ? '确认导出 (' + selectedIds.size + ')' : '确认导出';
}

function confirmExport() {
  if (selectedIds.size === 0) return;
  var selected = allRelations.filter(function(r) { return selectedIds.has(r.id); });
  var exportData = selected.map(function(r) { return {
    角色A: r.from_name || '',
    角色B: r.to_name || '',
    关系类型: r.relation_type || '',
    关系描述: r.description || '',
  };});
  var jsonStr = JSON.stringify(exportData, null, 2);
  var fileName = '关系网_' + selected.length + '条_' + new Date().toISOString().slice(0,10) + '.json';
  saveExportFile(jsonStr, fileName, '已导出 ' + selected.length + ' 条关系');
  cancelExport();
}

function saveExportFile(jsonStr, fileName, msg) {
  if (typeof Android !== 'undefined' && Android.saveFile) {
    var blob = new Blob([jsonStr], {type: 'application/json'});
    var reader = new FileReader();
    reader.onloadend = function() { Android.saveFile(reader.result, fileName); };
    reader.readAsDataURL(blob);
    showToast('请选择保存位置', 'success');
  } else {
    var blob = new Blob([jsonStr], {type: 'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast(msg, 'success');
  }
}

// ============================================================
// 触控拖拽排序
// ============================================================
let _tdEnabled = false, _tdEl = null, _tdGhost = null, _tdIdx = -1;
let _tdStartY = 0, _tdStartX = 0, _tdCurY = 0, _tdTimer = null;
let _tdListEl = null;

function _tdGetItems() {
  return [..._tdListEl.querySelectorAll('[data-drag-id]:not(.dragging)')];
}

function _tdFindTargetIdx(y) {
  let bestIdx = _tdIdx, bestDist = Infinity;
  _tdGetItems().forEach(item => {
    const rect = item.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    const dist = Math.abs(y - mid);
    if (dist < bestDist) { bestDist = dist; bestIdx = parseInt(item.dataset.dragIdx); }
  });
  return bestDist < 40 ? bestIdx : _tdIdx;
}

function _tdCreateGhost() {
  if (!_tdEl) return;
  const rect = _tdEl.getBoundingClientRect();
  _tdGhost = _tdEl.cloneNode(true);
  Object.assign(_tdGhost.style, {
    position:'fixed', zIndex:'9999', width:rect.width+'px', left:rect.left+'px',
    top:(_tdCurY - rect.height/2)+'px', opacity:'0.94', transform:'scale(1.03)',
    boxShadow:'0 8px 28px rgba(0,0,0,.2)', pointerEvents:'none', transition:'none',
    borderRadius:'12px', background:'#fffef9'
  });
  document.body.appendChild(_tdGhost);
  _tdEl.classList.add('dragging');
}

function _tdSwap(fromIdx, toIdx) {
  if (fromIdx === toIdx) return;
  const item = allRelations.splice(fromIdx, 1)[0];
  allRelations.splice(toIdx, 0, item);
}

function initTouchDrag() {
  _tdListEl = document.getElementById('relList');
  if (!_tdListEl) return;

  _tdListEl.addEventListener('touchstart', function(e) {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    const card = handle.closest('[data-drag-id]');
    if (!card) return;

    _tdEl = card;
    _tdIdx = parseInt(card.dataset.dragIdx);
    _tdStartX = e.touches[0].clientX;
    _tdStartY = e.touches[0].clientY;
    _tdCurY = _tdStartY;

    _tdTimer = setTimeout(() => {
      _tdEnabled = true;
      _tdCreateGhost();
      if (navigator.vibrate) navigator.vibrate(10);
    }, 400);
  }, {passive: false});

  _tdListEl.addEventListener('touchmove', function(e) {
    if (!_tdEnabled) {
      if (_tdTimer && (Math.abs(e.touches[0].clientY - _tdStartY) > 8 || Math.abs(e.touches[0].clientX - _tdStartX) > 8)) {
        clearTimeout(_tdTimer); _tdTimer = null; _tdEl = null; _tdIdx = -1;
      }
      return;
    }
    e.preventDefault();
    _tdCurY = e.touches[0].clientY;
    if (_tdGhost) {
      _tdGhost.style.top = (_tdCurY - _tdGhost.offsetHeight / 2) + 'px';
    }

    // 边缘自动滚动
    const edge = 70;
    if (_tdCurY < edge) window.scrollBy(0, -6);
    else if (_tdCurY > window.innerHeight - edge) window.scrollBy(0, 6);

    const newIdx = _tdFindTargetIdx(_tdCurY);
    if (newIdx !== _tdIdx) {
      _tdSwap(_tdIdx, newIdx);
      _tdIdx = newIdx;
      renderRelList();
      // 重新找到拖拽卡片
      const newCard = _tdListEl.querySelector(`[data-drag-idx="${_tdIdx}"]`);
      if (newCard) {
        _tdEl = newCard;
        _tdEl.classList.add('dragging');
      }
      if (_tdGhost) { _tdGhost.remove(); _tdCreateGhost(); }
    }
  }, {passive: false});

  _tdListEl.addEventListener('touchend', _tdEndDrag);
  _tdListEl.addEventListener('touchcancel', _tdEndDrag);
}

function _tdEndDrag() {
  clearTimeout(_tdTimer); _tdTimer = null;
  if (_tdEnabled) {
    _tdEnabled = false;
    if (_tdGhost) { _tdGhost.remove(); _tdGhost = null; }
    if (_tdEl) { _tdEl.classList.remove('dragging'); _tdEl = null; }
    saveRelOrder();
    renderRelList();
  }
  _tdEl = null; _tdIdx = -1;
}

async function saveRelOrder() {
  try {
    await fetch(`${API_REL}/reorder`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: allRelations.map((r, i) => ({ id: r.id, sort_order: i })) }),
    });
  } catch(e) { /* 静默失败 */ }
}

function moveRelUp(id) {
  const idx = allRelations.findIndex(r => r.id === id);
  if (idx <= 0) return;
  [allRelations[idx - 1], allRelations[idx]] = [allRelations[idx], allRelations[idx - 1]];
  saveRelOrder();
  renderRelList();
}

function moveRelDown(id) {
  const idx = allRelations.findIndex(r => r.id === id);
  if (idx < 0 || idx >= allRelations.length - 1) return;
  [allRelations[idx + 1], allRelations[idx]] = [allRelations[idx], allRelations[idx + 1]];
  saveRelOrder();
  renderRelList();
}

// ============================================================
// 关系图可视化（简化力导向布局，适配手机触摸）
// ============================================================
const G_FAMILY_COLORS = [
  '#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6',
  '#1abc9c', '#e67e22', '#2980b9', '#27ae60', '#8e44ad',
  '#e91e63', '#00bcd4', '#ff5722', '#607d8b', '#cddc39',
];
let gFamilyColorMap = {};   // 家族名 → 颜色
let gCanvas, gCtx, gW, gH, gDpr;
let gNodes = [];          // {id, name, family, x, y, vx, vy, fixed}
let gEdges = [];          // {from, to, type}
let gScale = 1, gOffsetX = 0, gOffsetY = 0;
let gDragNode = null, gDragging = false;
let gLastTouchDist = 0, gPanning = false, gLastX = 0, gLastY = 0;

function splitFamilies(famStr) {
  return (famStr || '').split(/[、,，]/).map(s => s.trim()).filter(Boolean);
}
function buildFamilyColors() {
  gFamilyColorMap = {};
  let idx = 0;
  allCharacters.forEach(c => {
    splitFamilies(c.family).forEach(fam => {
      if (fam && !(fam in gFamilyColorMap)) {
        gFamilyColorMap[fam] = G_FAMILY_COLORS[idx % G_FAMILY_COLORS.length];
        idx++;
      }
    });
  });
}
// 节点的主家族颜色（取第一个家族）
function nodeFamilyColor(n) {
  const fams = splitFamilies(n.family);
  return fams.length > 0 ? (gFamilyColorMap[fams[0]] || '#8b5e3c') : '#8b5e3c';
}
// 节点的所有家族
function nodeFamilies(n) { return splitFamilies(n.family); }

function graphInit() {
  gCanvas = document.getElementById('graphCanvas');
  const wrap = document.getElementById('canvasWrap');
  const empty = document.getElementById('graphEmpty');
  if (!gCanvas || !wrap) return;

  // 构建家族颜色映射
  buildFamilyColors();

  // 没有角色或关系时显示空状态
  if (allCharacters.length === 0) {
    empty.style.display = 'flex';
    empty.textContent = '先添加角色';
    if (gCtx) gCtx.clearRect(0, 0, gW, gH);
    return;
  }
  empty.style.display = 'none';

  // 初始化 canvas 尺寸
  gW = wrap.clientWidth;
  gH = wrap.clientHeight;
  gDpr = window.devicePixelRatio || 1;
  gCanvas.width = gW * gDpr;
  gCanvas.height = gH * gDpr;
  gCanvas.style.width = gW + 'px';
  gCanvas.style.height = gH + 'px';
  gCtx = gCanvas.getContext('2d');
  gCtx.setTransform(gDpr, 0, 0, gDpr, 0, 0);

  // 构建节点（只在首次或角色数变化时重新布局）
  const existingIds = new Set(gNodes.map(n => n.id));
  const currentIds = new Set(allCharacters.map(c => c.id));
  const needRelayout = existingIds.size !== currentIds.size ||
    [...currentIds].some(id => !existingIds.has(id));

  if (needRelayout || gNodes.length === 0) {
    // 按家族分组初始布局：同家族的节点放在一起
    // 初始分布范围扩大到 2 倍画布，避免挤一起
    const bigW = gW * 2, bigH = gH * 2;
    const families = Object.keys(gFamilyColorMap);
    const famCenters = {};
    families.forEach((fam, i) => {
      const angle = (i / Math.max(families.length, 1)) * Math.PI * 2;
      const r = Math.min(bigW, bigH) * 0.35;
      famCenters[fam] = { x: gW/2 + r*Math.cos(angle), y: gH/2 + r*Math.sin(angle) };
    });
    gNodes = allCharacters.map((c, i) => {
      const fams = splitFamilies(c.family);
      let x, y;
      if (fams.length > 0 && famCenters[fams[0]]) {
        const center = famCenters[fams[0]];
        x = center.x + (Math.random() - 0.5) * 80;
        y = center.y + (Math.random() - 0.5) * 80;
      } else {
        // 没家族的随机散布在大范围
        x = (gW - bigW)/2 + Math.random() * bigW;
        y = (gH - bigH)/2 + Math.random() * bigH;
      }
      return {
        id: c.id,
        name: c.name,
        family: c.family || '',
        x, y, vx: 0, vy: 0, fixed: false
      };
    });
    // 迭代力导向以优化初始布局
    for (let it = 0; it < 300; it++) {
      const cooling = 1 - it / 300;
      gSimulateStep(cooling);
    }
  } else {
    // 保留拖动位置，只更新名字和家族
    allCharacters.forEach(c => {
      const n = gNodes.find(n => n.id === c.id);
      if (n) { n.name = c.name; n.family = c.family || ''; }
    });
  }

  // 构建边
  gEdges = allRelations.map(r => ({
    from: r.from_char_id,
    to: r.to_char_id,
    type: r.relation_type || ''
  }));

  // 事件（只绑定一次）
  if (!gCanvas._bound) {
    gCanvas.addEventListener('touchstart', onTouchStart, {passive: false});
    gCanvas.addEventListener('touchmove', onTouchMove, {passive: false});
    gCanvas.addEventListener('touchend', onTouchEnd);
    gCanvas.addEventListener('mousedown', onMouseDown);
    gCanvas.addEventListener('mousemove', onMouseMove);
    gCanvas.addEventListener('mouseup', onMouseUp);
    gCanvas.addEventListener('mouseleave', onMouseUp);
    gCanvas.addEventListener('wheel', onWheel, {passive: false});
    gCanvas._bound = true;
  }

  graphDraw();
}

// 力模拟一步：排斥力 + 弹簧力
function gSimulateStep(cooling) {
  const k = 110;              // 理想距离（节点间期望距离）
  const repulsion = 6000;     // 排斥常数（强排斥避免重叠）
  const spring = 0.015;       // 弹簧常数（弱吸引，让有关系的靠近但不黏一起）
  const centerGravity = 0.001; // 中心引力（很弱，只是防止漂远）

  // 排斥力（所有节点对）
  for (let i = 0; i < gNodes.length; i++) {
    for (let j = i + 1; j < gNodes.length; j++) {
      let dx = gNodes[j].x - gNodes[i].x;
      let dy = gNodes[j].y - gNodes[i].y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
      // 限制最小距离，避免力爆炸
      dist = Math.max(dist, 15);
      const force = repulsion / (dist * dist);
      const fx = (dx / dist) * force * cooling;
      const fy = (dy / dist) * force * cooling;
      if (!gNodes[i].fixed) { gNodes[i].vx -= fx; gNodes[i].vy -= fy; }
      if (!gNodes[j].fixed) { gNodes[j].vx += fx; gNodes[j].vy += fy; }
    }
  }

  // 弹簧力（有关系的节点对）
  gEdges.forEach(e => {
    const a = gNodes.find(n => n.id === e.from);
    const b = gNodes.find(n => n.id === e.to);
    if (!a || !b) return;
    let dx = b.x - a.x, dy = b.y - a.y;
    let dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
    const force = (dist - k) * spring * cooling;
    const fx = (dx / dist) * force;
    const fy = (dy / dist) * force;
    if (!a.fixed) { a.vx += fx; a.vy += fy; }
    if (!b.fixed) { b.vx -= fx; b.vy -= fy; }
  });

  // 家族聚类力（同家族节点互相吸引，不同家族保持距离）
  const famK = 70;           // 家族内理想距离
  const famSpring = 0.02;    // 家族内吸引力
  for (let i = 0; i < gNodes.length; i++) {
    for (let j = i + 1; j < gNodes.length; j++) {
      const a = gNodes[i], b = gNodes[j];
      const aFams = nodeFamilies(a), bFams = nodeFamilies(b);
      // 有共同家族才吸引
      const shared = aFams.some(f => bFams.includes(f));
      if (!shared) continue;
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
      const force = (dist - famK) * famSpring * cooling;
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      if (!a.fixed) { a.vx += fx; a.vy += fy; }
      if (!b.fixed) { b.vx -= fx; b.vy -= fy; }
    }
  }

  // 中心引力 + 阻尼 + 位置更新
  gNodes.forEach(n => {
    if (n.fixed) return;
    n.vx += (gW / 2 - n.x) * centerGravity * cooling;
    n.vy += (gH / 2 - n.y) * centerGravity * cooling;
    // 阻尼
    n.vx *= 0.82; n.vy *= 0.82;
    n.x += n.vx * cooling; n.y += n.vy * cooling;
    // 不做硬边界约束，让节点自由分布，用户可以拖动/缩放查看
  });
}

// ====== 凸包算法（Monotone Chain） ======
function gCross(o, a, b) { return (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x); }
function gConvexHull(points) {
  if (points.length <= 2) return points;
  const sorted = points.slice().sort((a, b) => a.x - b.x || a.y - b.y);
  const lower = [];
  for (const p of sorted) {
    while (lower.length >= 2 && gCross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = sorted.length - 1; i >= 0; i--) {
    const p = sorted[i];
    while (upper.length >= 2 && gCross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
    upper.push(p);
  }
  lower.pop(); upper.pop();
  return lower.concat(upper);
}

function graphDraw() {
  if (!gCtx) return;
  gCtx.clearRect(0, 0, gW, gH);

  gCtx.save();
  gCtx.translate(gOffsetX, gOffsetY);
  gCtx.scale(gScale, gScale);

  // 1. 画家族包围圈（在所有节点和边下面）
  drawFamilyClusters();

  // 2. 画边（带箭头，区分单向/双向）
  gEdges.forEach(e => {
    const a = gNodes.find(n => n.id === e.from);
    const b = gNodes.find(n => n.id === e.to);
    if (!a || !b) return;
    const isBidirectional = ['CP', '朋友', '冤家', '亲属'].includes(e.type);
    const isTeach = e.type === '师生';
    const color = isBidirectional ? '#c2185b' : isTeach ? '#1565c0' : '#8b5e3c';

    // 计算线条起止点（从节点边缘开始）
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const ux = dx / len, uy = dy / len;
    const nodeR = 16;
    const sx = a.x + ux * nodeR, sy = a.y + uy * nodeR;
    const ex = b.x - ux * nodeR, ey = b.y - uy * nodeR;
    const arrowSize = 7;

    // 画线
    gCtx.strokeStyle = color;
    gCtx.globalAlpha = 0.7;
    gCtx.lineWidth = isBidirectional ? 2.5 : 1.8;
    if (isTeach) gCtx.setLineDash([6, 4]);
    gCtx.beginPath();
    gCtx.moveTo(sx, sy);
    gCtx.lineTo(ex, ey);
    gCtx.stroke();
    gCtx.setLineDash([]);

    // 画箭头（目标端）
    gCtx.globalAlpha = 0.9;
    gCtx.fillStyle = color;
    gCtx.beginPath();
    gCtx.moveTo(ex, ey);
    gCtx.lineTo(ex - ux * arrowSize - uy * arrowSize * 0.6, ey - uy * arrowSize + ux * arrowSize * 0.6);
    gCtx.lineTo(ex - ux * arrowSize + uy * arrowSize * 0.6, ey - uy * arrowSize - ux * arrowSize * 0.6);
    gCtx.closePath();
    gCtx.fill();

    // 双向关系：源端也画箭头
    if (isBidirectional) {
      gCtx.beginPath();
      gCtx.moveTo(sx, sy);
      gCtx.lineTo(sx + ux * arrowSize - uy * arrowSize * 0.6, sy + uy * arrowSize + ux * arrowSize * 0.6);
      gCtx.lineTo(sx + ux * arrowSize + uy * arrowSize * 0.6, sy + uy * arrowSize - ux * arrowSize * 0.6);
      gCtx.closePath();
      gCtx.fill();
    }

    // 边中点显示类型
    if (e.type) {
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2;
      gCtx.globalAlpha = 0.9;
      gCtx.font = '10px "PingFang SC","Microsoft YaHei",sans-serif';
      const tw = gCtx.measureText(e.type).width;
      gCtx.fillStyle = '#fffef9';
      gCtx.fillRect(mx - tw / 2 - 3, my - 7, tw + 6, 14);
      gCtx.fillStyle = color;
      gCtx.textAlign = 'center';
      gCtx.textBaseline = 'middle';
      gCtx.fillText(e.type, mx, my);
    }
    gCtx.globalAlpha = 1;
  });

  // 3. 画节点（用家族颜色）
  gNodes.forEach(n => {
    const famColor = nodeFamilyColor(n);
    // 外圈
    gCtx.beginPath();
    gCtx.arc(n.x, n.y, 16, 0, Math.PI * 2);
    gCtx.fillStyle = n === gDragNode ? '#c49a6c' : famColor;
    gCtx.fill();
    gCtx.strokeStyle = '#fffef9';
    gCtx.lineWidth = 2;
    gCtx.stroke();

    // 名字
    gCtx.fillStyle = '#3d2b1f';
    gCtx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
    gCtx.textAlign = 'center';
    gCtx.textBaseline = 'top';
    let label = n.name || ('#' + n.id);
    if (label.length > 5) label = label.slice(0, 4) + '…';
    gCtx.fillText(label, n.x, n.y + 20);
  });

  gCtx.restore();
}

// 画家族凸包：同家族的节点用凸多边形围起来
function drawFamilyClusters() {
  const famPoints = {};   // 家族名 → [{x,y}]
  gNodes.forEach(n => {
    nodeFamilies(n).forEach(fam => {
      if (!famPoints[fam]) famPoints[fam] = [];
      famPoints[fam].push({ x: n.x, y: n.y });
    });
  });

  const pad = 18;       // 凸包外扩距离
  const nodeR = 16;     // 节点半径

  Object.entries(famPoints).forEach(([fam, pts]) => {
    if (pts.length < 1) return;
    const color = gFamilyColorMap[fam] || '#8b5e3c';

    if (pts.length === 1) {
      // 单节点：小圆
      const r = nodeR + pad;
      gCtx.beginPath();
      gCtx.arc(pts[0].x, pts[0].y, r, 0, Math.PI * 2);
      gCtx.fillStyle = color + '14';
      gCtx.fill();
      gCtx.strokeStyle = color + '66';
      gCtx.lineWidth = 1.5;
      gCtx.setLineDash([5, 3]);
      gCtx.stroke();
      gCtx.setLineDash([]);
      gCtx.fillStyle = color;
      gCtx.font = '10px "PingFang SC","Microsoft YaHei",sans-serif';
      gCtx.textAlign = 'center';
      gCtx.textBaseline = 'bottom';
      gCtx.fillText(fam, pts[0].x, pts[0].y - r - 4);
      return;
    }

    // 多节点：为每个节点生成环绕点（节点圆上的采样点 + 外扩）
    const periPts = [];
    const samples = 8;
    pts.forEach(p => {
      for (let i = 0; i < samples; i++) {
        const a = (2 * Math.PI * i) / samples;
        periPts.push({
          x: p.x + (nodeR + pad) * Math.cos(a),
          y: p.y + (nodeR + pad) * Math.sin(a)
        });
      }
    });

    const hull = gConvexHull(periPts);
    if (hull.length < 3) {
      // 退化为线段时，画胶囊形
      if (hull.length === 2) {
        gCtx.beginPath();
        gCtx.moveTo(hull[0].x, hull[0].y);
        gCtx.lineTo(hull[1].x, hull[1].y);
        gCtx.strokeStyle = color + '66';
        gCtx.lineWidth = (nodeR + pad) * 2;
        gCtx.lineCap = 'round';
        gCtx.globalAlpha = 0.5;
        gCtx.stroke();
        gCtx.globalAlpha = 1;
        gCtx.lineCap = 'butt';
      }
      return;
    }

    // 画填充
    gCtx.beginPath();
    gCtx.moveTo(hull[0].x, hull[0].y);
    for (let i = 1; i < hull.length; i++) gCtx.lineTo(hull[i].x, hull[i].y);
    gCtx.closePath();
    gCtx.fillStyle = color + '0F';   // 约 6% 透明度
    gCtx.fill();

    // 画边框（虚线）
    gCtx.strokeStyle = color + '66';
    gCtx.lineWidth = 1.5;
    gCtx.setLineDash([5, 3]);
    gCtx.stroke();
    gCtx.setLineDash([]);

    // 家族标签：放在凸包最上方
    let cx = 0, cy = 0;
    hull.forEach(p => { cx += p.x; cy += p.y; });
    cx /= hull.length; cy /= hull.length;
    let topY = Infinity;
    hull.forEach(p => { topY = Math.min(topY, p.y); });
    gCtx.fillStyle = color;
    gCtx.font = '10px "PingFang SC","Microsoft YaHei",sans-serif';
    gCtx.textAlign = 'center';
    gCtx.textBaseline = 'bottom';
    gCtx.fillText(fam, cx, topY - 4);
  });
}

// 把屏幕坐标转为画布逻辑坐标
function screenToCanvas(x, y) {
  return { x: (x - gOffsetX) / gScale, y: (y - gOffsetY) / gScale };
}

function nodeAt(x, y) {
  for (let i = gNodes.length - 1; i >= 0; i--) {
    const n = gNodes[i];
    const dx = x - n.x, dy = y - n.y;
    if (dx * dx + dy * dy <= 22 * 22) return n;
  }
  return null;
}

// ====== 触摸事件 ======
function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    const rect = gCanvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;
    const p = screenToCanvas(x, y);
    const node = nodeAt(p.x, p.y);
    if (node) {
      gDragNode = node;
      node.fixed = true;
    } else {
      gPanning = true;
      gLastX = x; gLastY = y;
    }
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    gLastTouchDist = Math.sqrt(dx * dx + dy * dy);
    gDragNode = null; gPanning = false;
  }
}

function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    const rect = gCanvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;
    if (gDragNode) {
      const p = screenToCanvas(x, y);
      gDragNode.x = p.x; gDragNode.y = p.y;
      gDragNode.vx = 0; gDragNode.vy = 0;
      graphDraw();
    } else if (gPanning) {
      gOffsetX += x - gLastX;
      gOffsetY += y - gLastY;
      gLastX = x; gLastY = y;
      graphDraw();
    }
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (gLastTouchDist > 0) {
      const factor = dist / gLastTouchDist;
      gScale = Math.max(0.3, Math.min(3, gScale * factor));
      graphDraw();
    }
    gLastTouchDist = dist;
  }
}

function onTouchEnd(e) {
  if (e.touches.length === 0) {
    if (gDragNode) { gDragNode.fixed = false; gDragNode = null; }
    gPanning = false;
    gLastTouchDist = 0;
  }
}

// ====== 鼠标事件（方便在浏览器调试） ======
function onMouseDown(e) {
  const rect = gCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const p = screenToCanvas(x, y);
  const node = nodeAt(p.x, p.y);
  if (node) { gDragNode = node; node.fixed = true; gDragging = true; }
  else { gPanning = true; gLastX = x; gLastY = y; }
}
function onMouseMove(e) {
  if (!gDragging && !gPanning) return;
  const rect = gCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  if (gDragNode) {
    const p = screenToCanvas(x, y);
    gDragNode.x = p.x; gDragNode.y = p.y;
    graphDraw();
  } else if (gPanning) {
    gOffsetX += x - gLastX; gOffsetY += y - gLastY;
    gLastX = x; gLastY = y;
    graphDraw();
  }
}
function onMouseUp() {
  if (gDragNode) { gDragNode.fixed = false; gDragNode = null; }
  gDragging = false; gPanning = false;
}
function onWheel(e) {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  gScale = Math.max(0.3, Math.min(3, gScale * factor));
  graphDraw();
}

// ====== 控制按钮 ======
function graphZoom(factor) {
  gScale = Math.max(0.3, Math.min(3, gScale * factor));
  graphDraw();
}
function graphReset() {
  gScale = 1; gOffsetX = 0; gOffsetY = 0;
  buildFamilyColors();
  // 按家族分组初始布局（大范围分布）
  const bigW = gW * 2, bigH = gH * 2;
  const families = Object.keys(gFamilyColorMap);
  const famCenters = {};
  families.forEach((fam, i) => {
    const angle = (i / Math.max(families.length, 1)) * Math.PI * 2;
    const r = Math.min(bigW, bigH) * 0.35;
    famCenters[fam] = { x: gW/2 + r*Math.cos(angle), y: gH/2 + r*Math.sin(angle) };
  });
  gNodes = allCharacters.map(c => {
    const fams = splitFamilies(c.family);
    let x, y;
    if (fams.length > 0 && famCenters[fams[0]]) {
      const center = famCenters[fams[0]];
      x = center.x + (Math.random() - 0.5) * 80;
      y = center.y + (Math.random() - 0.5) * 80;
    } else {
      x = (gW - bigW)/2 + Math.random() * bigW;
      y = (gH - bigH)/2 + Math.random() * bigH;
    }
    return { id: c.id, name: c.name, family: c.family || '', x, y, vx: 0, vy: 0, fixed: false };
  });
  for (let it = 0; it < 300; it++) {
    const cooling = 1 - it / 300;
    gSimulateStep(cooling);
  }
  graphDraw();
}

// 窗口大小变化时重绘
window.addEventListener('resize', () => {
  if (gCanvas && allCharacters.length > 0) {
    const wrap = document.getElementById('canvasWrap');
    gW = wrap.clientWidth; gH = wrap.clientHeight;
    gCanvas.width = gW * gDpr; gCanvas.height = gH * gDpr;
    gCanvas.style.width = gW + 'px'; gCanvas.style.height = gH + 'px';
    gCtx.setTransform(gDpr, 0, 0, gDpr, 0, 0);
    graphDraw();
  }
});
</script>
