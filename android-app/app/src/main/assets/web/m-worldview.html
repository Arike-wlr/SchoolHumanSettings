<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3d2b1f">
<title>世界设定</title>
<script>
if (location.protocol === 'file:') {
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('a[href]').forEach(function(a) {
      var h = a.getAttribute('href');
      var map = {'/m':'m-index.html','/m/worldview':'m-worldview.html','/m/relations':'m-relations.html','/m/documents':'m-documents.html'};
      if (map[h]) a.href = map[h];
    });
  });
}
</script>
<style>
  :root {
    --bg: #f5f0eb; --card-bg: #fffef9; --text: #3d322b; --text-light: #8c7b6e;
    --accent: #8b5e3c; --accent-light: #c49a6c; --accent-pale: #f0e4d4;
    --danger: #c0392b; --danger-bg: #fce4e4; --border: #e0d5c7;
    --shadow: 0 2px 12px rgba(60,40,20,.06); --radius: 12px;
    --font-serif: 'Georgia', 'Noto Serif SC', serif;
    --font-sans: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: calc(64px + var(--safe-bottom)); -webkit-font-smoothing: antialiased; }

  .header { background: linear-gradient(135deg, #3d2b1f 0%, #5a3e2b 50%, #7a5543 100%); color: #f5ede4; padding: 16px; padding-top: max(16px, env(safe-area-inset-top, 0px)); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.15); }
  .header h1 { font-family: var(--font-serif); font-size: 1.15rem; font-weight: 500; }
  .header .subtitle { font-size: .72rem; opacity: .65; margin-top: 2px; }

  .main-cat-tabs { display: flex; gap: 6px; padding: 10px 14px 6px; }
  .main-cat-tab { flex: 1; padding: 8px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; font-size: .85rem; color: var(--text-light); cursor: pointer; text-align: center; transition: all .2s; }
  .main-cat-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .toolbar { padding: 4px 14px 8px; display: flex; align-items: center; gap: 8px; }
  .count { font-size: .82rem; color: var(--text-light); flex-shrink: 0; }
  .count strong { color: var(--accent); font-weight: 600; }
  .search-wrap { flex: 1; position: relative; display: flex; align-items: center; }
  .search-icon { position: absolute; left: 10px; font-size: .9rem; opacity: .5; pointer-events: none; }
  .search-input { width: 100%; padding: 8px 32px 8px 30px; border: 1px solid var(--border); border-radius: 20px; font-size: .88rem; background: var(--card-bg); color: var(--text); outline: none; }
  .search-input:focus { border-color: var(--accent-light); }
  .clear-btn { position: absolute; right: 8px; background: none; border: none; color: var(--text-light); font-size: .85rem; padding: 4px 8px; cursor: pointer; display: none; }
  .search-wrap.has-value .clear-btn { display: block; }

  .btn-add { display: block; width: calc(100% - 28px); margin: 4px 14px 8px; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: .95rem; font-weight: 500; cursor: pointer; box-shadow: 0 2px 8px rgba(139,94,60,.25); }
  .btn-add:active { transform: scale(.98); }

  .cat-tabs { display: flex; gap: 6px; padding: 4px 14px 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab { flex-shrink: 0; padding: 6px 14px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; font-size: .8rem; color: var(--text-light); cursor: pointer; white-space: nowrap; }
  .cat-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab-count { margin-left: 4px; font-size: .7rem; opacity: .7; }

  .card-list { padding: 4px 14px 20px; display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--card-bg); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); cursor: pointer; transition: transform .15s; }
  .card:active { transform: scale(.98); }
  .card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .card-title { font-size: 1rem; font-weight: 600; }
  .cat-tag { font-size: .72rem; color: var(--accent); background: var(--accent-pale); padding: 2px 8px; border-radius: 10px; }
  .content-preview { font-size: .85rem; color: var(--text-light); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-more { margin-top: 6px; font-size: .75rem; color: var(--accent); }
  .card-actions { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .btn-action { flex: 1; padding: 7px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text); font-size: .82rem; cursor: pointer; }
  .btn-action:active { background: var(--accent-pale); }
  .btn-action.danger { color: var(--danger); border-color: var(--danger-bg); }

  /* 上移/下移按钮 */
  .sort-btn { display: flex; align-items: center; justify-content: center; width: 34px; min-width: 34px; height: 34px; background: none; border: 1.5px solid var(--border); border-radius: 8px; color: var(--text-light); font-size: 1.05rem; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; padding: 0; line-height: 1; }
  .sort-btn:active { background: var(--accent-pale); color: var(--accent); border-color: var(--accent); }
  .export-mode .sort-btn { display: none; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-light); }
  .empty .icon { font-size: 2.5rem; margin-bottom: 8px; opacity: .5; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .no-result { text-align: center; padding: 40px 20px; color: var(--text-light); font-size: .88rem; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, #2a1a12 0%, #1a0e08 100%); display: flex; padding-bottom: var(--safe-bottom); box-shadow: 0 -2px 12px rgba(0,0,0,.15); z-index: 200; }
  .nav-item { flex: 1; padding: 10px 4px 8px; text-align: center; color: #8c7b6e; text-decoration: none; }
  .nav-item.active { color: #c49a6c; }
  .nav-icon { font-size: 1.3rem; display: block; }
  .nav-text { font-size: .68rem; margin-top: 2px; }

  .modal-overlay { position: fixed; inset: 0; background: var(--card-bg); z-index: 300; display: none; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--card-bg); width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
  .modal-header { padding: 14px 16px; padding-top: calc(32px + var(--safe-top)); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--card-bg); z-index: 2; }
  .modal-title { font-size: 1rem; font-weight: 600; }
  .modal-close { background: none; border: none; font-size: 1.2rem; color: var(--text-light); padding: 4px 8px; cursor: pointer; }
  .modal-body { padding: 14px 16px 24px; padding-bottom: 60vh; }
  .modal-footer { padding: 12px 16px calc(12px + var(--safe-bottom)); border-top: 1px solid var(--border); display: flex; gap: 10px; position: sticky; bottom: 0; background: var(--card-bg); z-index: 2; }
  .btn-modal { flex: 1; padding: 12px; border: none; border-radius: var(--radius); font-size: .92rem; font-weight: 500; cursor: pointer; }
  .btn-modal.primary { background: var(--accent); color: #fff; }
  .btn-modal.cancel { background: var(--accent-pale); color: var(--text); }
  .btn-modal.danger { background: var(--danger); color: #fff; }

  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: .82rem; color: var(--text-light); margin-bottom: 5px; }
  .form-input, .form-textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: .92rem; background: var(--bg); color: var(--text); outline: none; font-family: inherit; }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent-light); background: var(--card-bg); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-textarea.large { min-height: 200px; }

  .detail-section { margin-bottom: 14px; }
  .detail-label { font-size: .75rem; color: var(--text-light); margin-bottom: 3px; }
  .detail-value { font-size: .92rem; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }

  .toast { position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); background: rgba(60,40,20,.92); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: .85rem; z-index: 400; opacity: 0; transition: opacity .3s; pointer-events: none; max-width: 90%; text-align: center; }
  .toast.show { opacity: 1; }
  .toast.error { background: rgba(192,57,43,.92); }
  .toast.success { background: rgba(39,124,79,.92); }

  /* ====== 导出模式 ====== */
  .card-check { display: none; position: absolute; top:12px; left:12px; width:28px; height:28px; cursor:pointer; accent-color:var(--accent); z-index:2; }
  .export-mode .card-check { display: block; }
  .export-mode .card { cursor: default; }
  .export-mode .card:active { transform: none; }
  .card.selected { border-color: var(--accent); background: var(--accent-pale); }
  .export-bar { display: none; gap: 8px; margin: 6px 14px 0; align-items: center; }
  .export-mode .export-bar { display: flex; }
  .btn-export-outline { padding:8px 14px; background:var(--card-bg); color:var(--text); border:1px solid var(--border); border-radius:8px; font-size:.82rem; cursor:pointer; }
  .btn-export-primary { flex:1; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-size:.95rem; font-weight:500; cursor:pointer; margin:0; box-shadow:0 2px 8px rgba(139,94,60,.25); }
  .btn-export-primary:disabled { opacity:.5; cursor:default; }
  .btn-export-trigger { display:block; width:calc(100% - 28px); margin:6px 14px 8px; padding:12px; background:var(--card-bg); color:var(--accent); border:1.5px solid var(--accent); border-radius:var(--radius); font-size:.95rem; font-weight:500; cursor:pointer; box-shadow:none; }
  .btn-export-trigger:active { background:var(--accent-pale); }
  .export-mode .btn-export-trigger { display: none; }
</style>
</head>
<body>

<header class="header">
  <h1>世界设定</h1>
  <p class="subtitle">世界观与人物背景</p>
</header>

<div class="main-cat-tabs">
  <button class="main-cat-tab active" data-main="意识体世界设定" onclick="selectMainCategory('意识体世界设定')">意识体世界设定</button>
  <button class="main-cat-tab" data-main="人物背景故事" onclick="selectMainCategory('人物背景故事')">人物背景故事</button>
</div>

<div class="toolbar">
  <span class="count">共 <strong id="entryCount">…</strong> 条</span>
  <div class="search-wrap" id="searchWrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="搜索标题或内容…" oninput="onSearch()">
    <button class="clear-btn" onclick="clearSearch()">✕</button>
  </div>
</div>

<button class="btn-add" onclick="openCreateModal()">＋ 添加新设定</button>

<div class="export-bar" id="exportActions">
  <button class="btn-export-outline" onclick="toggleSelectAll()">全选</button>
  <button class="btn-export-outline" onclick="cancelExport()" style="color:var(--text-light);">放弃</button>
  <button class="btn-export-primary" id="confirmExportBtn" onclick="confirmExport()" disabled>确认导出</button>
</div>
<button class="btn-export-trigger" id="exportBtn" onclick="enterExportMode()">📥 选择导出</button>

<div class="cat-tabs" id="catTabs"></div>

<div class="card-list" id="entryGrid"></div>
<div class="no-result" id="noResult" style="display:none;">未找到匹配的设定</div>
<div class="empty" id="loadingState" style="display:block;">
  <div class="icon" style="animation:spin 1s linear infinite;">⏳</div>
  <p>加载中…</p>
</div>
<div class="empty" id="emptyState" style="display:none;">
  <div class="icon">🌍</div>
  <p id="emptyText">还没有世界设定</p>
</div>

<!-- 添加/编辑 Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">添加新设定</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="entryForm" onsubmit="submitForm(event)">
        <input type="hidden" id="editId">
        <input type="hidden" id="mainCategoryInput">
        <div class="form-group" id="categoryGroup">
          <label class="form-label">分类</label>
          <input type="text" class="form-input" id="categoryInput" placeholder="如：地理、历史、文化" list="catList">
          <datalist id="catList"></datalist>
        </div>
        <div class="form-group">
          <label class="form-label">标题 *</label>
          <input type="text" class="form-input" id="title" required placeholder="设定标题">
        </div>
        <div class="form-group">
          <label class="form-label">内容</label>
          <textarea class="form-textarea large" id="content" rows="12" placeholder="详细内容…"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-modal cancel" onclick="closeModal()">取消</button>
      <button class="btn-modal primary" onclick="document.getElementById('entryForm').requestSubmit()" id="submitBtn">确认添加</button>
    </div>
  </div>
</div>

<!-- 详情 Modal -->
<div class="modal-overlay" id="detailOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="detailTitle">详情</span>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn-modal cancel" onclick="closeDetailModal()">关闭</button>
      <button class="btn-modal primary" onclick="detailEdit()">编辑</button>
    </div>
  </div>
</div>

<!-- 删除确认 -->
<div class="modal-overlay" id="deleteOverlay">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <span class="modal-title">确认删除</span>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <div class="modal-body" style="text-align:center;padding:24px 16px;">
      <p style="margin-bottom:8px;">确定要删除</p>
      <p style="font-size:1.1rem;font-weight:600;color:var(--danger);" id="deleteName"></p>
      <p style="margin-top:8px;color:var(--text-light);font-size:.85rem;">此操作不可撤销</p>
    </div>
    <div class="modal-footer">
      <button class="btn-modal cancel" onclick="closeDeleteModal()">取消</button>
      <button class="btn-modal danger" onclick="confirmDelete()">删除</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="/m" class="nav-item"><span class="nav-icon">📖</span><span class="nav-text">角色</span></a>
  <a href="/m/worldview" class="nav-item active"><span class="nav-icon">🌍</span><span class="nav-text">世界观</span></a>
  <a href="/m/relations" class="nav-item"><span class="nav-icon">🔗</span><span class="nav-text">关系网</span></a>
  <a href="/m/documents" class="nav-item"><span class="nav-icon">📄</span><span class="nav-text">文档</span></a>
</nav>

<div class="toast" id="toast"></div>

<script>
const API = '/api/world-buildings';

const MAIN_CATS = ['意识体世界设定', '人物背景故事'];
let allEntries = [];
let activeMainCategory = '意识体世界设定';
let activeCategory = '全部';
let deleteTargetId = null;
let detailEntryId = null;
let selectedIds = new Set();
let exportMode = false;

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

document.addEventListener('DOMContentLoaded', () => {
  initTouchDrag();
  loadEntries();
});

async function loadEntries() {
  try {
    const q = activeMainCategory ? `?main_category=${encodeURIComponent(activeMainCategory)}` : '';
    const res = await fetch(API + q);
    allEntries = await res.json();
    document.getElementById('loadingState').style.display = 'none';
    const currentIds = new Set(allEntries.map(e => e.id));
    for (const id of selectedIds) { if (!currentIds.has(id)) selectedIds.delete(id); }
    buildCatTabs();
    applyFilter();
    updateEmptyText();
  } catch (e) {
    document.getElementById('loadingState').style.display = 'none';
    showToast('加载失败', 'error');
  }
}

function updateEmptyText() {
  document.getElementById('emptyText').textContent = (activeMainCategory === '人物背景故事') ? '还没有人物背景故事' : '还没有世界设定';
}

function selectMainCategory(mainCat) {
  activeMainCategory = mainCat;
  activeCategory = '全部';
  document.querySelectorAll('.main-cat-tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.main-cat-tab[data-main="${mainCat}"]`);
  if (tab) tab.classList.add('active');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchWrap').classList.remove('has-value');
  document.getElementById('catTabs').style.display = (mainCat === '人物背景故事') ? 'none' : '';
  loadEntries();
}

function buildCatTabs() {
  const container = document.getElementById('catTabs');
  const groups = {};
  for (const e of allEntries) {
    const cat = e.category || '未分类';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(e);
  }
  const ordered = Object.entries(groups).sort((a, b) => b[1].length - a[1].length);
  let html = `<button class="cat-tab active" data-cat="全部" onclick="selectCategory('全部')">全部<span class="tab-count">${allEntries.length}</span></button>`;
  for (const [cat, list] of ordered) {
    html += `<button class="cat-tab" data-cat="${esc(cat)}" onclick="selectCategory('${esc(cat)}')">${esc(cat)}<span class="tab-count">${list.length}</span></button>`;
  }
  container.innerHTML = html;
  const dl = document.getElementById('catList');
  dl.innerHTML = ordered.map(([cat]) => `<option value="${esc(cat)}">`).join('');
}

function selectCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.cat-tab[data-cat="${cat}"]`);
  if (tab) tab.classList.add('active');
  applyFilter();
}

function onSearch() {
  const val = document.getElementById('searchInput').value.trim();
  document.getElementById('searchWrap').classList.toggle('has-value', val.length > 0);
  applyFilter();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchWrap').classList.remove('has-value');
  applyFilter();
}

function applyFilter() {
  const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = allEntries;
  if (activeCategory !== '全部') filtered = filtered.filter(e => e.category === activeCategory);
  if (searchVal) filtered = filtered.filter(e => (e.title||'').toLowerCase().includes(searchVal) || (e.content||'').toLowerCase().includes(searchVal));
  renderGrid(filtered);
}

function renderGrid(entries) {
  const grid = document.getElementById('entryGrid');
  const empty = document.getElementById('emptyState');
  const noResult = document.getElementById('noResult');
  const count = document.getElementById('entryCount');
  const searchVal = document.getElementById('searchInput').value.trim();
  count.textContent = (searchVal || activeCategory !== '全部') ? `${entries.length}/${allEntries.length}` : allEntries.length;
  if (allEntries.length === 0) { grid.innerHTML=''; empty.style.display='block'; noResult.style.display='none'; return; }
  empty.style.display = 'none';
  if (entries.length === 0 && (searchVal || activeCategory !== '全部')) { grid.innerHTML=''; noResult.style.display='block'; return; }
  noResult.style.display = 'none';
  // 计算全局索引映射
  const idxMap = {};
  entries.forEach(e => { idxMap[e.id] = allEntries.indexOf(e); });
  grid.innerHTML = entries.map(e => cardHTML(e, idxMap[e.id])).join('');
  if (exportMode) updateExportButtons();
}

function cardHTML(e, globalIdx) {
  const contentText = e.content || '';
  const preview = contentText.length > 120 ? contentText.substring(0,120)+'…' : contentText;
  const showCat = activeMainCategory !== '人物背景故事' && e.category;
  const cardExtraClass = selectedIds.has(e.id) ? ' selected' : '';
  return `
    <div class="card${cardExtraClass}" data-drag-id="${e.id}" data-drag-idx="${globalIdx !== undefined ? globalIdx : 0}" onclick="handleCardClick(${e.id})">
      <input type="checkbox" class="card-check" ${selectedIds.has(e.id) ? 'checked' : ''} onclick="event.stopPropagation();toggleCardSelect(${e.id}, this.checked)" title="选择导出">
      <div class="card-header">
        <button class="sort-btn" title="上移" onclick="event.stopPropagation();moveWorldUp(${e.id});return false;">↑</button>
        <button class="sort-btn" title="下移" onclick="event.stopPropagation();moveWorldDown(${e.id});return false;">↓</button>
        <span class="card-title">${esc(e.title)}</span>
        ${showCat?`<span class="cat-tag">${esc(e.category)}</span>`:''}
      </div>
      ${preview?`<div class="content-preview">${esc(preview)}</div>`:''}
      <div class="card-actions">
        <button class="btn-action" onclick="event.stopPropagation();openEditModal(${e.id})">编辑</button>
        <button class="btn-action danger" onclick="event.stopPropagation();openDeleteModal(${e.id},'${esc(e.title)}')">删除</button>
      </div>
    </div>`;
}

function openCreateModal() {
  document.getElementById('modalTitle').textContent = '添加新设定';
  document.getElementById('submitBtn').textContent = '确认添加';
  document.getElementById('editId').value = '';
  document.getElementById('mainCategoryInput').value = activeMainCategory;
  document.getElementById('entryForm').reset();
  document.getElementById('categoryGroup').style.display = (activeMainCategory === '人物背景故事') ? 'none' : '';
  document.getElementById('modalOverlay').classList.add('active');
}

async function openEditModal(id) {
  try {
    const res = await fetch(`${API}/${id}`);
    const e = await res.json();
    document.getElementById('modalTitle').textContent = '编辑设定';
    document.getElementById('submitBtn').textContent = '保存修改';
    document.getElementById('editId').value = e.id;
    document.getElementById('mainCategoryInput').value = e.main_category || '';
    document.getElementById('title').value = e.title || '';
    document.getElementById('categoryInput').value = e.category || '';
    document.getElementById('content').value = e.content || '';
    document.getElementById('categoryGroup').style.display = (e.main_category === '人物背景故事') ? 'none' : '';
    document.getElementById('modalOverlay').classList.add('active');
  } catch (err) { showToast('获取数据失败', 'error'); }
}

async function submitForm(e) {
  e.preventDefault();
  const editId = document.getElementById('editId').value;
  const data = {
    main_category: document.getElementById('mainCategoryInput').value,
    title: document.getElementById('title').value.trim(),
    category: document.getElementById('categoryInput').value.trim(),
    content: document.getElementById('content').value.trim(),
  };
  try {
    const url = editId ? `${API}/${editId}` : API;
    const method = editId ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
    if (!res.ok) throw new Error();
    closeModal();
    loadEntries();
    showToast(editId ? '已更新' : '已创建', 'success');
  } catch (err) { showToast('操作失败', 'error'); }
}

function openDeleteModal(id, name) {
  deleteTargetId = id;
  document.getElementById('deleteName').textContent = name;
  document.getElementById('deleteOverlay').classList.add('active');
}
function closeDeleteModal() { document.getElementById('deleteOverlay').classList.remove('active'); deleteTargetId = null; }
async function confirmDelete() {
  if (!deleteTargetId) return;
  try {
    await fetch(`${API}/${deleteTargetId}`, { method: 'DELETE' });
    closeDeleteModal(); loadEntries();
    showToast('已删除', 'success');
  } catch (e) { showToast('删除失败', 'error'); }
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
document.getElementById('deleteOverlay').addEventListener('click', function(e) { if (e.target === this) closeDeleteModal(); });

async function openDetailModal(id) {
  try {
    const res = await fetch(`${API}/${id}`);
    const e = await res.json();
    detailEntryId = e.id;
    document.getElementById('detailTitle').textContent = e.title;
    let body = '';
    if (e.main_category === '人物背景故事') {
      // 人物背景只显示内容
    } else if (e.category) {
      body += `<div class="detail-section"><div class="detail-label">分类</div><div class="detail-value">${esc(e.category)}</div></div>`;
    }
    if (e.content) body += `<div class="detail-section"><div class="detail-label">内容</div><div class="detail-value">${esc(e.content)}</div></div>`;
    document.getElementById('detailBody').innerHTML = body || '<p style="color:var(--text-light);text-align:center;padding:20px;">暂无内容</p>';
    document.getElementById('detailOverlay').classList.add('active');
  } catch (e) { showToast('获取详情失败', 'error'); }
}

function closeDetailModal() { document.getElementById('detailOverlay').classList.remove('active'); detailEntryId = null; }
function detailEdit() { if (detailEntryId) { const id = detailEntryId; closeDetailModal(); openEditModal(id); } }
document.getElementById('detailOverlay').addEventListener('click', function(e) { if (e.target === this) closeDetailModal(); });

// ====== 选择导出 ======
function enterExportMode() {
  exportMode = true;
  selectedIds.clear();
  document.body.classList.add('export-mode');
  applyFilter();
}

function cancelExport() {
  exportMode = false;
  selectedIds.clear();
  document.body.classList.remove('export-mode');
  applyFilter();
}

function handleCardClick(id) {
  if (exportMode) {
    var checkbox = document.querySelector('.card[data-drag-id="' + id + '"] .card-check');
    if (checkbox) {
      checkbox.checked = !checkbox.checked;
      toggleCardSelect(id, checkbox.checked);
    }
    return;
  }
  openDetailModal(id);
}

function toggleCardSelect(id, checked) {
  if (checked) selectedIds.add(id);
  else selectedIds.delete(id);
  const card = document.querySelector('.card[data-drag-id="' + id + '"]');
  if (card) card.classList.toggle('selected', checked);
  updateExportButtons();
}

function toggleSelectAll() {
  const cards = document.querySelectorAll('#entryGrid .card[data-drag-id]');
  if (cards.length === 0) return;
  const visibleIds = [];
  cards.forEach(function(c) { visibleIds.push(parseInt(c.dataset.dragId)); });
  const allSelected = visibleIds.every(function(id) { return selectedIds.has(id); });
  if (allSelected) {
    visibleIds.forEach(function(id) { selectedIds.delete(id); });
  } else {
    visibleIds.forEach(function(id) { selectedIds.add(id); });
  }
  applyFilter();
}

function updateExportButtons() {
  var btn = document.getElementById('confirmExportBtn');
  if (!btn) return;
  btn.disabled = selectedIds.size === 0;
  btn.textContent = selectedIds.size > 0 ? '确认导出 (' + selectedIds.size + ')' : '确认导出';
}

function confirmExport() {
  if (selectedIds.size === 0) return;
  var selected = allEntries.filter(function(e) { return selectedIds.has(e.id); });
  var exportData = selected.map(function(e) { return {
    标题: e.title,
    大类: e.main_category || '',
    分类: e.category || '',
    内容: e.content || '',
  };});
  var jsonStr = JSON.stringify(exportData, null, 2);
  var fileName = '世界观设定_' + selected.length + '条_' + new Date().toISOString().slice(0,10) + '.json';
  saveExportFile(jsonStr, fileName, '已导出 ' + selected.length + ' 条设定');
  cancelExport();
}

function saveExportFile(jsonStr, fileName, msg) {
  if (typeof Android !== 'undefined' && Android.saveFile) {
    var blob = new Blob([jsonStr], {type: 'application/json'});
    var reader = new FileReader();
    reader.onloadend = function() { Android.saveFile(reader.result, fileName); };
    reader.readAsDataURL(blob);
    showToast('请选择保存位置', 'success');
  } else {
    var blob = new Blob([jsonStr], {type: 'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast(msg, 'success');
  }
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================================
// 触控拖拽排序
// ============================================================
let _tdEnabled = false, _tdEl = null, _tdGhost = null, _tdIdx = -1;
let _tdStartY = 0, _tdStartX = 0, _tdCurY = 0, _tdTimer = null;
let _tdListEl = null;

function _tdGetItems() {
  return [..._tdListEl.querySelectorAll('[data-drag-id]:not(.dragging)')];
}

function _tdFindTargetIdx(y) {
  let bestIdx = _tdIdx, bestDist = Infinity;
  _tdGetItems().forEach(item => {
    const rect = item.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    const dist = Math.abs(y - mid);
    if (dist < bestDist) { bestDist = dist; bestIdx = parseInt(item.dataset.dragIdx); }
  });
  return bestDist < 40 ? bestIdx : _tdIdx;
}

function _tdCreateGhost() {
  if (!_tdEl) return;
  const rect = _tdEl.getBoundingClientRect();
  _tdGhost = _tdEl.cloneNode(true);
  Object.assign(_tdGhost.style, {
    position:'fixed', zIndex:'9999', width:rect.width+'px', left:rect.left+'px',
    top:(_tdCurY - rect.height/2)+'px', opacity:'0.94', transform:'scale(1.03)',
    boxShadow:'0 8px 28px rgba(0,0,0,.2)', pointerEvents:'none', transition:'none',
    borderRadius:'12px', background:'#fffef9'
  });
  _tdGhost.querySelector('.drag-handle')?.remove();
  document.body.appendChild(_tdGhost);
  _tdEl.classList.add('dragging');
}

function _tdSwap(fromIdx, toIdx) {
  if (fromIdx === toIdx) return;
  const item = allEntries.splice(fromIdx, 1)[0];
  allEntries.splice(toIdx, 0, item);
}

function initTouchDrag() {
  _tdListEl = document.getElementById('entryGrid');
  if (!_tdListEl) return;

  _tdListEl.addEventListener('touchstart', function(e) {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    const card = handle.closest('[data-drag-id]');
    if (!card) return;

    _tdEl = card;
    _tdIdx = parseInt(card.dataset.dragIdx);
    _tdStartX = e.touches[0].clientX;
    _tdStartY = e.touches[0].clientY;
    _tdCurY = _tdStartY;

    _tdTimer = setTimeout(() => {
      _tdEnabled = true;
      _tdCreateGhost();
      if (navigator.vibrate) navigator.vibrate(10);
    }, 400);
  }, {passive: false});

  _tdListEl.addEventListener('touchmove', function(e) {
    if (!_tdEnabled) {
      if (_tdTimer && (Math.abs(e.touches[0].clientY - _tdStartY) > 8 || Math.abs(e.touches[0].clientX - _tdStartX) > 8)) {
        clearTimeout(_tdTimer); _tdTimer = null; _tdEl = null; _tdIdx = -1;
      }
      return;
    }
    e.preventDefault();
    _tdCurY = e.touches[0].clientY;
    if (_tdGhost) {
      _tdGhost.style.top = (_tdCurY - _tdGhost.offsetHeight / 2) + 'px';
    }

    const edge = 70;
    if (_tdCurY < edge) window.scrollBy(0, -6);
    else if (_tdCurY > window.innerHeight - edge) window.scrollBy(0, 6);

    const newIdx = _tdFindTargetIdx(_tdCurY);
    if (newIdx !== _tdIdx) {
      _tdSwap(_tdIdx, newIdx);
      _tdIdx = newIdx;
      applyFilter();  // 重新渲染当前筛选视图
      const newCard = _tdListEl.querySelector(`[data-drag-idx="${_tdIdx}"]`);
      if (newCard) {
        _tdEl = newCard;
        _tdEl.classList.add('dragging');
      }
      if (_tdGhost) { _tdGhost.remove(); _tdCreateGhost(); }
    }
  }, {passive: false});

  _tdListEl.addEventListener('touchend', _tdEndDrag);
  _tdListEl.addEventListener('touchcancel', _tdEndDrag);
}

function _tdEndDrag() {
  clearTimeout(_tdTimer); _tdTimer = null;
  if (_tdEnabled) {
    _tdEnabled = false;
    if (_tdGhost) { _tdGhost.remove(); _tdGhost = null; }
    if (_tdEl) { _tdEl.classList.remove('dragging'); _tdEl = null; }
    saveWorldOrder();
    applyFilter();
  }
  _tdEl = null; _tdIdx = -1;
}

async function saveWorldOrder() {
  try {
    await fetch(`${API}/reorder`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: allEntries.map((e, i) => ({ id: e.id, sort_order: i })) }),
    });
  } catch(e) { /* 静默失败 */ }
}

function moveWorldUp(id) {
  const idx = allEntries.findIndex(e => e.id === id);
  if (idx <= 0) return;
  [allEntries[idx - 1], allEntries[idx]] = [allEntries[idx], allEntries[idx - 1]];
  saveWorldOrder();
  applyFilter();
}

function moveWorldDown(id) {
  const idx = allEntries.findIndex(e => e.id === id);
  if (idx < 0 || idx >= allEntries.length - 1) return;
  [allEntries[idx + 1], allEntries[idx]] = [allEntries[idx], allEntries[idx + 1]];
  saveWorldOrder();
  applyFilter();
}
