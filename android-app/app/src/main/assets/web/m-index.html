<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3d2b1f">
<title>角色设定簿</title>
<script>
// 离线模式：重写导航链接
if (location.protocol === 'file:') {
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('a[href]').forEach(function(a) {
      var h = a.getAttribute('href');
      var map = {'/m':'m-index.html','/m/worldview':'m-worldview.html','/m/relations':'m-relations.html','/m/documents':'m-documents.html'};
      if (map[h]) a.href = map[h];
    });
  });
}
</script>
<style>
  :root {
    --bg: #f5f0eb;
    --card-bg: #fffef9;
    --text: #3d322b;
    --text-light: #8c7b6e;
    --accent: #8b5e3c;
    --accent-light: #c49a6c;
    --accent-pale: #f0e4d4;
    --danger: #c0392b;
    --danger-bg: #fce4e4;
    --border: #e0d5c7;
    --shadow: 0 2px 12px rgba(60,40,20,.06);
    --radius: 12px;
    --font-serif: 'Georgia', 'Noto Serif SC', serif;
    --font-sans: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(64px + var(--safe-bottom));
    -webkit-font-smoothing: antialiased;
  }

  /* ====== 顶部 Header ====== */
  .header {
    background: linear-gradient(135deg, #3d2b1f 0%, #5a3e2b 50%, #7a5543 100%);
    color: #f5ede4;
    padding: 16px 16px calc(16px + env(safe-area-inset-top, 0px));
    padding-top: max(16px, env(safe-area-inset-top, 0px));
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.15);
  }
  .header h1 {
    font-family: var(--font-serif);
    font-size: 1.15rem;
    font-weight: 500;
    letter-spacing: .04em;
  }
  .header .subtitle {
    font-size: .72rem;
    opacity: .65;
    margin-top: 2px;
  }

  /* ====== 工具栏 ====== */
  .toolbar {
    padding: 12px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .toolbar-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .count {
    font-size: .82rem;
    color: var(--text-light);
    flex-shrink: 0;
  }
  .count strong { color: var(--accent); font-weight: 600; }
  .search-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
  }
  .search-icon {
    position: absolute;
    left: 10px;
    font-size: .9rem;
    opacity: .5;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 8px 32px 8px 30px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: .88rem;
    background: var(--card-bg);
    color: var(--text);
    outline: none;
  }
  .search-input:focus { border-color: var(--accent-light); }
  .clear-btn {
    position: absolute;
    right: 8px;
    background: none;
    border: none;
    color: var(--text-light);
    font-size: .85rem;
    padding: 4px 8px;
    cursor: pointer;
    display: none;
  }
  .search-wrap.has-value .clear-btn { display: block; }

  .btn-add {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: .95rem;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(139,94,60,.25);
    transition: transform .1s;
  }
  .btn-add:active { transform: scale(.98); }

  /* ====== 导出模式（模仿 m-documents 风格） ====== */
  .card { position: relative; }
  .card-check { display: none; position: absolute; top: 14px; left: 12px; width: 28px; height: 28px; cursor: pointer; accent-color: var(--accent); z-index: 2; }
  .export-mode .card-check { display: block; }
  .export-mode .card { cursor: default; }
  .export-mode .card:active { transform: none; }
  .card.selected { border-color: var(--accent); background: var(--accent-pale); }
  .export-bar { display: none; gap: 8px; margin: 6px 14px 0; align-items: center; }
  .export-mode .export-bar { display: flex; }
  .btn-export-outline { padding: 8px 14px; background: var(--card-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-size: .82rem; cursor: pointer; }
  .btn-export-primary { flex: 1; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: .95rem; font-weight: 500; cursor: pointer; margin: 0; box-shadow: 0 2px 8px rgba(139,94,60,.25); }
  .btn-export-primary:disabled { opacity: .5; cursor: default; }
  .btn-export-trigger { display: block; width: calc(100% - 28px); margin: 6px 14px 8px; padding: 12px; background: var(--card-bg); color: var(--accent); border: 1.5px solid var(--accent); border-radius: var(--radius); font-size: .95rem; font-weight: 500; cursor: pointer; box-shadow: none; }
  .btn-export-trigger:active { background: var(--accent-pale); }
  .export-mode .btn-export-trigger { display: none; }

  /* ====== 地区标签 ====== */
  .region-tabs {
    display: flex;
    gap: 6px;
    padding: 4px 14px 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .region-tabs::-webkit-scrollbar { display: none; }
  .region-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    font-size: .8rem;
    color: var(--text-light);
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
  }
  .region-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .tab-count {
    margin-left: 4px;
    font-size: .7rem;
    opacity: .7;
  }

  /* ====== 角色卡片 ====== */
  .card-list {
    padding: 4px 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .region-divider {
    margin: 8px 0 4px;
    padding: 4px 0;
    font-size: .78rem;
    color: var(--text-light);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
  }
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    border: 2px solid transparent;
  }
  .card:active { transform: scale(.98); }
  .card.perished { opacity: .65; }
  .card.selected { border-color: var(--accent); background: var(--accent-pale); }

  .card-header {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .card-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
  }
  .uni-tag {
    font-size: .72rem;
    color: var(--accent);
    background: var(--accent-pale);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .gender-badge {
    font-size: .7rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .gender-badge.male { background: #e3f2fd; color: #1565c0; }
  .gender-badge.female { background: #fce4ec; color: #c2185b; }
  .gender-badge.other { background: #f3e5f5; color: #7b1fa2; }
  .status-badge {
    font-size: .7rem;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--danger-bg);
    color: var(--danger);
  }
  .status-badge.ordinary {
    background: #e8eaf0;
    color: #5a6478;
  }
  .card.ordinary { opacity: 0.8; filter: grayscale(0.4); }

  .card-fields {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .field-row {
    display: flex;
    font-size: .82rem;
    line-height: 1.5;
  }
  .field-label {
    color: var(--text-light);
    min-width: 48px;
    flex-shrink: 0;
  }
  .field-value {
    color: var(--text);
    flex: 1;
    word-break: break-word;
  }
  .setting-preview {
    color: var(--text-light);
    font-size: .8rem;
    line-height: 1.5;
    margin-top: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-more {
    margin-top: 6px;
    font-size: .75rem;
    color: var(--accent);
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .btn-action {
    flex: 1;
    padding: 7px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--text);
    font-size: .82rem;
    cursor: pointer;
  }
  .btn-action:active { background: var(--accent-pale); }
  .btn-action.danger { color: var(--danger); border-color: var(--danger-bg); flex: 0 0 auto; padding: 7px 14px; }

  /* 触控拖拽排序 */
  .drag-handle { display: flex; align-items: center; justify-content: center; width: 28px; min-width: 28px; height: 28px; color: var(--text-light); font-size: 1.1rem; cursor: grab; -webkit-user-select: none; user-select: none; touch-action: none; flex-shrink: 0; }
  .drag-handle:active { cursor: grabbing; }

  /* 上移/下移按钮 */
  .sort-btn { display: flex; align-items: center; justify-content: center; width: 44px; min-width: 44px; height: 44px; background: none; border: 1.5px solid var(--border); border-radius: 8px; color: var(--text-light); font-size: 1.1rem; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; padding: 0; line-height: 1; }
  .sort-btn:active { background: var(--accent-pale); color: var(--accent); border-color: var(--accent); }
  .export-mode .sort-btn { display: none; }
  .card.dragging { opacity: 0.3; transform: scale(0.96); }
  .card.drag-over { border-color: var(--accent); border-style: dashed; background: var(--accent-pale); }

  /* ====== 空状态 ====== */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }
  .empty .icon { font-size: 2.5rem; margin-bottom: 8px; opacity: .5; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .no-result {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-light);
    font-size: .88rem;
  }

  /* ====== 底部导航 ====== */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(180deg, #2a1a12 0%, #1a0e08 100%);
    display: flex;
    padding-bottom: var(--safe-bottom);
    box-shadow: 0 -2px 12px rgba(0,0,0,.15);
    z-index: 200;
  }
  .nav-item {
    flex: 1;
    padding: 10px 4px 8px;
    text-align: center;
    color: #8c7b6e;
    text-decoration: none;
    transition: color .2s;
  }
  .nav-item.active { color: #c49a6c; }
  .nav-icon { font-size: 1.3rem; display: block; }
  .nav-text { font-size: .68rem; margin-top: 2px; }

  /* ====== Modal ====== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: var(--card-bg);
    z-index: 300;
    display: none;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--card-bg);
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .modal-header {
    /* 顶部多留 32px，避开手机状态栏 */
    padding: 14px 16px;
    padding-top: calc(32px + var(--safe-top));
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--card-bg);
    z-index: 2;
  }
  .modal-title {
    font-size: 1rem;
    font-weight: 600;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 1.2rem;
    color: var(--text-light);
    padding: 4px 8px;
    cursor: pointer;
  }
  .modal-body {
    padding: 14px 16px 24px;
    /* 关键：底部留出大空间，键盘弹出时也能滚到设定框 */
    padding-bottom: 60vh;
  }
  .modal-footer {
    padding: 12px 16px calc(12px + var(--safe-bottom));
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    position: sticky;
    bottom: 0;
    background: var(--card-bg);
    z-index: 2;
  }
  .btn-modal {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: var(--radius);
    font-size: .92rem;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-modal.primary { background: var(--accent); color: #fff; }
  .btn-modal.cancel { background: var(--accent-pale); color: var(--text); }
  .btn-modal.danger { background: var(--danger); color: #fff; }

  /* ====== 表单 ====== */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: .82rem;
    color: var(--text-light);
    margin-bottom: 5px;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: .92rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    font-family: inherit;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent-light);
    background: var(--card-bg);
  }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-textarea.large { min-height: 200px; }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* ====== 详情 ====== */
  .detail-section {
    margin-bottom: 14px;
  }
  .detail-label {
    font-size: .75rem;
    color: var(--text-light);
    margin-bottom: 3px;
  }
  .detail-value {
    font-size: .92rem;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .detail-value.muted { color: var(--text-light); font-style: italic; }
  .detail-info-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  /* ====== Toast ====== */
  .toast {
    position: fixed;
    bottom: calc(80px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%);
    background: rgba(60,40,20,.92);
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: .85rem;
    z-index: 400;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    max-width: 90%;
    text-align: center;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: rgba(192,57,43,.92); }
  .toast.success { background: rgba(39,124,79,.92); }
</style>
</head>
<body>

<header class="header">
  <h1>高校拟人OC 设定簿</h1>
  <p class="subtitle">角色设定管理</p>
</header>

<div class="toolbar">
  <div class="toolbar-top">
    <span class="count">共 <strong id="charCount">…</strong> 位</span>
    <div class="search-wrap" id="searchWrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="搜索校名或角色名…" oninput="onSearch()">
      <button class="clear-btn" onclick="clearSearch()">✕</button>
    </div>
  </div>
  <button class="btn-add" onclick="openCreateModal()">＋ 添加新角色</button>
  <div class="export-bar" id="exportActions">
    <button class="btn-export-outline" onclick="toggleSelectAll()" id="selectAllBtn">全选</button>
    <button class="btn-export-outline" onclick="cancelExport()" style="color:var(--text-light);">放弃</button>
    <button class="btn-export-primary" id="confirmExportBtn" onclick="confirmExport()" disabled>确认导出</button>
  </div>
  <button class="btn-export-trigger" id="exportBtn" onclick="enterExportMode()">📥 选择导出</button>
</div>

<div class="region-tabs" id="regionTabs"></div>

<div class="card-list" id="charGrid"></div>
<div class="no-result" id="noResult" style="display:none;">未找到匹配的角色</div>
<div class="empty" id="loadingState" style="display:block;">
  <div class="icon" style="animation:spin 1s linear infinite;">⏳</div>
  <p>加载中…</p>
</div>
<div class="empty" id="emptyState" style="display:none;">
  <div class="icon">📖</div>
  <p>还没有角色设定</p>
</div>

<!-- 添加/编辑 Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">添加新角色</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="charForm" onsubmit="submitForm(event)">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label class="form-label">姓名 *</label>
          <input type="text" class="form-input" id="name" required placeholder="角色姓名">
        </div>
        <div class="form-group">
          <label class="form-label">别名</label>
          <input type="text" class="form-input" id="alias" placeholder="字、曾用名">
        </div>
        <div class="form-group">
          <label class="form-label">代表高校</label>
          <input type="text" class="form-input" id="university" placeholder="如：南京大学">
        </div>
        <div class="form-group">
          <label class="form-label">地区</label>
          <input type="text" class="form-input" id="region" placeholder="如：南京、北京">
        </div>
        <div class="form-group">
          <label class="form-label">取名依据</label>
          <textarea class="form-textarea" id="namingRationale" rows="3" placeholder="名字来源、含义…"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">身高</label>
            <input type="text" class="form-input" id="height" placeholder="175cm">
          </div>
          <div class="form-group">
            <label class="form-label">性别</label>
            <select class="form-select" id="gender">
              <option value="">请选择</option>
              <option value="男">男</option>
              <option value="女">女</option>
              <option value="其他">其他</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">生日</label>
          <input type="text" class="form-input" id="birthday" placeholder="5月20日">
        </div>
        <div class="form-group">
          <label class="form-label">外貌</label>
          <textarea class="form-textarea" id="appearance" rows="4" placeholder="外貌特征…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">身份存在时间</label>
          <input type="text" class="form-input" id="identityPeriod" placeholder="如：1905-至今">
        </div>
        <div class="form-group">
          <label class="form-label">诞生时间</label>
          <input type="text" class="form-input" id="birthTime" placeholder="如：1905年">
        </div>
        <div class="form-group">
          <label class="form-label">诞生地</label>
          <input type="text" class="form-input" id="birthplace" placeholder="如：南京">
        </div>
        <div class="form-group">
          <label class="form-label">存在状态</label>
          <select class="form-select" id="status">
            <option value="存在">存在</option>
            <option value="已消逝">已消逝</option>
            <option value="普通人">普通人</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">角色图片（可多选）</label>
          <input type="file" id="image" accept="image/*" multiple style="display: none;" onchange="handleImageUpload(event)">
          <div class="image-upload-container" style="border: 2px dashed var(--border); border-radius: var(--radius-sm); padding: 16px; background: #fefdf9; text-align: center; margin-bottom: 8px;">
            <div id="imagePreviewGrid" style="display: none; margin-bottom: 12px;"></div>
            <button type="button" class="btn-action" onclick="document.getElementById('image').click()" style="width: 100%; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 8px;">
              <span style="font-size: 1.2rem;">📷</span> 选择图片文件（可多选）
            </button>
            <div class="image-upload-hint" style="font-size: 0.75rem; color: var(--text-light); margin-top: 6px; text-align: center;">
              支持 JPG、PNG、GIF 格式，可一次选择多张，建议尺寸 300×400
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">设定</label>
          <textarea class="form-textarea large" id="setting" rows="10" placeholder="角色详细设定…"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">

    <span class="nav-icon">📄</span>
    <span class="nav-text">文档</span>
  </a>
</nav>

<div class="toast" id="toast"></div>

<script>
const API = '/api/characters';

let deleteTargetId = null;
let allCharacters = [];
let activeRegion = '全部';
// 多图：currentImageUrls 已上传URL；currentImageFiles 待上传新文件
let currentImageUrls = [];
let currentImageFiles = [];

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// 归一化 images 字段：兼容后端返回数组或 JSON 字符串，回退到 image_url
function normalizeImages(c) {
  let imgs = c.images;
  if (typeof imgs === 'string') {
    try { imgs = JSON.parse(imgs); } catch (e) { imgs = []; }
  }
  if (!Array.isArray(imgs)) imgs = [];
  if (imgs.length === 0 && c.image_url) imgs = [c.image_url];
  return imgs;
}

// 图片上传处理（多图）
function handleImageUpload(event) {
  const files = Array.from(event.target.files || []);
  if (files.length === 0) return;
  for (const file of files) {
    if (!file.type.startsWith('image/')) {
      showToast(`文件 ${file.name} 不是图片，已跳过`, 'error');
      continue;
    }
    if (file.size > 20 * 1024 * 1024) {
      showToast(`图片 ${file.name} 超过20MB，已跳过`, 'error');
      continue;
    }
    currentImageFiles.push({ file, previewUrl: URL.createObjectURL(file) });
  }
  renderImagePreview();
  event.target.value = '';
}

function renderImagePreview() {
  const grid = document.getElementById('imagePreviewGrid');
  const items = [
    ...currentImageUrls.map((url, i) => ({ url, index: i })),
    ...currentImageFiles.map((item, i) => ({ url: item.previewUrl, index: currentImageUrls.length + i })),
  ];
  if (items.length === 0) {
    grid.style.display = 'none';
    grid.innerHTML = '';
    return;
  }
  grid.style.display = 'grid';
  grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(72px, 1fr))';
  grid.style.gap = '8px';
  grid.innerHTML = items.map(it => `
    <div style="position: relative; aspect-ratio: 1; border-radius: 6px; overflow: hidden; border: 1px solid var(--border);">
      <img src="${it.url}" alt="预览" style="width: 100%; height: 100%; object-fit: cover;">
      <button type="button" onclick="removeImageItem(${it.index})" title="删除"
        style="position: absolute; top: 2px; right: 2px; width: 20px; height: 20px; border-radius: 50%; border: none; background: rgba(0,0,0,0.6); color: #fff; cursor: pointer; font-size: 12px; line-height: 1; display: flex; align-items: center; justify-content: center;">✕</button>
    </div>
  `).join('');
}

function removeImageItem(index) {
  const urlCount = currentImageUrls.length;
  if (index < urlCount) {
    currentImageUrls.splice(index, 1);
  } else {
    const fileIdx = index - urlCount;
    URL.revokeObjectURL(currentImageFiles[fileIdx].previewUrl);
    currentImageFiles.splice(fileIdx, 1);
  }
  renderImagePreview();
}

function resetImageUpload() {
  currentImageFiles.forEach(item => URL.revokeObjectURL(item.previewUrl));
  currentImageUrls = [];
  currentImageFiles = [];
  const grid = document.getElementById('imagePreviewGrid');
  grid.style.display = 'none';
  grid.innerHTML = '';
  document.getElementById('image').value = '';
}

// 详情页图片翻页
let detailImages = [];
let detailImageIdx = 0;

function renderDetailImage() {
  const imgs = detailImages;
  const wrap = document.getElementById('detailImage');
  if (!imgs || imgs.length === 0) {
    wrap.style.display = 'none';
    wrap.innerHTML = '';
    return;
  }
  const btnStyle = 'width:32px; height:32px; border-radius:50%; border:1px solid var(--border); background:var(--bg); cursor:pointer; font-size:18px; line-height:1; color:var(--text); flex-shrink:0;';
  const spacer = '<span style="display:inline-block; width:32px; flex-shrink:0;"></span>';
  const prevBtn = detailImageIdx > 0
    ? `<button onclick="detailImageGo(${detailImageIdx - 1})" style="${btnStyle}" title="上一张">‹</button>`
    : spacer;
  const nextBtn = detailImageIdx < imgs.length - 1
    ? `<button onclick="detailImageGo(${detailImageIdx + 1})" style="${btnStyle}" title="下一张">›</button>`
    : spacer;
  const counter = imgs.length > 1 ? `<div style="font-size:0.75rem; color:var(--text-light); margin-top:4px;">${detailImageIdx + 1} / ${imgs.length}</div>` : '';
  const thumbs = imgs.length > 1 ? imgs.map((url, i) => `
    <img src="${url}" onclick="detailImageGo(${i})" style="width:42px; height:42px; object-fit:cover; border-radius:4px; cursor:pointer; border:2px solid ${i === detailImageIdx ? 'var(--primary)' : 'transparent'};">`).join('') : '';
  wrap.innerHTML = `
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      ${prevBtn}
      <div style="flex:1; text-align:center; min-width:0;">
        <img src="${imgs[detailImageIdx]}" alt="角色图片" style="max-width:100%; max-height:240px; border-radius:6px; object-fit:contain;">
        ${counter}
      </div>
      ${nextBtn}
    </div>
    ${thumbs ? `<div style="display:flex; gap:6px; justify-content:center; flex-wrap:wrap;">${thumbs}</div>` : ''}
  `;
  wrap.style.display = 'block';
}

function detailImageGo(idx) {
  if (idx < 0 || idx >= detailImages.length) return;
  detailImageIdx = idx;
  renderDetailImage();
}

document.addEventListener('DOMContentLoaded', () => {
  initTouchDrag();
  loadCharacters();
});

async function loadCharacters() {
  try {
    const res = await fetch(API);
    allCharacters = await res.json();
    document.getElementById('loadingState').style.display = 'none';
    buildRegionTabs();
    applyFilter();
  } catch (e) {
    document.getElementById('loadingState').style.display = 'none';
    showToast('加载失败，请确认后端已启动', 'error');
  }
}

function groupByRegion(chars) {
  const groups = {};
  for (const c of chars) {
    const r = c.region || '未分类';
    if (!groups[r]) groups[r] = [];
    groups[r].push(c);
  }
  return groups;
}

function buildRegionTabs() {
  const container = document.getElementById('regionTabs');
  const groups = groupByRegion(allCharacters);
  const orderedRegions = Object.entries(groups).filter(([_,l])=>l.length>0).sort((a,b)=>b[1].length-a[1].length).map(([r])=>r);
  let html = `<button class="region-tab${activeRegion==='全部'?' active':''}" data-region="全部" onclick="selectRegion('全部')">全部<span class="tab-count">${allCharacters.length}</span></button>`;
  for (const r of orderedRegions) {
    html += `<button class="region-tab${activeRegion===r?' active':''}" data-region="${esc(r)}" onclick="selectRegion('${esc(r)}')">${esc(r)}<span class="tab-count">${groups[r].length}</span></button>`;
  }
  container.innerHTML = html;
}

function selectRegion(r) {
  activeRegion = r;
  document.querySelectorAll('.region-tab').forEach(t=>t.classList.remove('active'));
  const tab = document.querySelector(`.region-tab[data-region="${r}"]`);
  if (tab) tab.classList.add('active');
  applyFilter();
}

function onSearch() {
  const val = document.getElementById('searchInput').value.trim();
  document.getElementById('searchWrap').classList.toggle('has-value', val.length>0);
  applyFilter();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchWrap').classList.remove('has-value');
  applyFilter();
}

function applyFilter() {
  const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = allCharacters;
  if (activeRegion !== '全部') filtered = filtered.filter(c => c.region === activeRegion);
  if (searchVal) filtered = filtered.filter(c => (c.university||'').toLowerCase().includes(searchVal) || (c.name||'').toLowerCase().includes(searchVal));
  renderGrid(filtered);
  if (exportMode) updateExportButtons();
}

function renderGrid(chars) {
  const grid = document.getElementById('charGrid');
  const empty = document.getElementById('emptyState');
  const noResult = document.getElementById('noResult');
  const count = document.getElementById('charCount');
  const searchVal = document.getElementById('searchInput').value.trim();

  count.textContent = (searchVal || activeRegion!=='全部') ? `${chars.length}/${allCharacters.length}` : allCharacters.length;

  if (allCharacters.length === 0) {
    grid.innerHTML = ''; empty.style.display='block'; noResult.style.display='none'; return;
  }
  empty.style.display = 'none';
  if (chars.length === 0 && (searchVal || activeRegion!=='全部')) {
    grid.innerHTML = ''; noResult.style.display='block'; return;
  }
  noResult.style.display = 'none';

  // 计算全局索引映射
  const idxMap = {};
  chars.forEach(c => { idxMap[c.id] = allCharacters.indexOf(c); });

  if (activeRegion === '全部' && !searchVal) {
    const groups = groupByRegion(chars);
    let html = '';
    const orderedRegions = Object.entries(groups).filter(([_,l])=>l.length>0).sort((a,b)=>b[1].length-a[1].length).map(([r])=>r);
    for (const r of orderedRegions) {
      html += `<div class="region-divider">${esc(r)} · ${groups[r].length}位</div>`;
      html += groups[r].map(c => cardHTML(c, idxMap[c.id])).join('');
    }
    grid.innerHTML = html;
  } else {
    grid.innerHTML = chars.map(c => cardHTML(c, idxMap[c.id])).join('');
  }
}

function cardHTML(c, globalIdx) {
  const genderClass = c.gender==='男'?'male':c.gender==='女'?'female':'other';
  const statusText = c.status || '存在';
  const statusBadge = statusText !== '存在' ? `<span class="status-badge ${statusText === '普通人' ? ' ordinary' : ''} perished">${statusText}</span>` : '';
  const cardExtraClass = (statusText==='已消逝'?' perished':statusText==='普通人'?' ordinary':'');
  const settingText = c.setting || '';
  const settingTruncated = settingText.length > 80 ? settingText.substring(0,80)+'…' : settingText;
  
  // 图片预览（证件照样式，放右侧，顶部与名字齐平、底部与生日齐平）
  const normImgs = normalizeImages(c);
  const imgCount = normImgs.length;
  const coverUrl = normImgs[0] || '';
  let photoHTML = '';
  if (coverUrl && coverUrl.trim() !== '') {
    const badge = imgCount > 1 ? `<span style="position:absolute;right:2px;bottom:2px;background:rgba(0,0,0,0.65);color:#fff;font-size:10px;padding:1px 4px;border-radius:7px;line-height:1.3;">共${imgCount}张</span>` : '';
    photoHTML = `
      <div style="flex-shrink:0; width:88px; position:relative; align-self:stretch; margin-right:4px; margin-top:4px; min-height:64px;">
        <div style="width:88px; height:100%; border-radius:4px; overflow:hidden; border:1px solid var(--border); background:#f8f9fa;">
          <img src="${coverUrl}" alt="${esc(c.name)}" loading="lazy" style="width:100%; height:100%; object-fit:cover;">
        </div>
        ${badge}
      </div>`;
  }

  // 前3个字段（别名/身高/生日）与图片并排，设定放下方
  let topFields = '';
  if (c.alias) topFields += `<div class="field-row"><span class="field-label">别名</span><span class="field-value">${esc(c.alias)}</span></div>`;
  if (c.height) topFields += `<div class="field-row"><span class="field-label">身高</span><span class="field-value">${esc(c.height)}</span></div>`;
  if (c.birthday) topFields += `<div class="field-row"><span class="field-label">生日</span><span class="field-value">${esc(c.birthday)}</span></div>`;
  
  const exportChecked = selectedIds.has(c.id) ? 'checked' : '';
  const exportSelected = selectedIds.has(c.id) ? ' selected' : '';
  return `
    <div class="card${cardExtraClass}${exportSelected}" data-drag-id="${c.id}" data-drag-idx="${globalIdx !== undefined ? globalIdx : 0}" onclick="handleCardClick(${c.id})">
      <input type="checkbox" class="card-check" ${exportChecked} onclick="event.stopPropagation();toggleCardSelect(${c.id}, this.checked)" title="选择导出">
      <div style="display:flex; gap:10px; align-items:stretch;">
        <div style="flex:1; min-width:0;">
          <div class="card-header">
            <button class="sort-btn" title="上移" onclick="event.stopPropagation();moveCharUp(${c.id});return false;">↑</button>
            <button class="sort-btn" title="下移" onclick="event.stopPropagation();moveCharDown(${c.id});return false;">↓</button>
            <span class="card-name">${esc(c.name)}</span>
            ${c.university?`<span class="uni-tag">${esc(c.university)}</span>`:''}
            ${c.gender?`<span class="gender-badge ${genderClass}">${esc(c.gender)}</span>`:''}
            ${statusBadge}
          </div>
          <div class="card-fields">${topFields}</div>
        </div>
        ${photoHTML}
      </div>
      ${settingTruncated?`<div class="setting-preview">${esc(settingTruncated)}</div>`:''}
      <div class="card-actions">
        <button class="btn-action" onclick="event.stopPropagation();openEditModal(${c.id})">编辑</button>
        <button class="btn-action danger" onclick="event.stopPropagation();openDeleteModal(${c.id},'${esc(c.name)}')">删除</button>
      </div>
    </div>`;
}

function openCreateModal() {
  document.getElementById('modalTitle').textContent = '添加新角色';
  document.getElementById('submitBtn').textContent = '确认添加';
  document.getElementById('editId').value = '';
  document.getElementById('charForm').reset();
  resetImageUpload();
  document.getElementById('modalOverlay').classList.add('active');
}

async function openEditModal(id) {
  try {
    const res = await fetch(`${API}/${id}`);
    const c = await res.json();
    document.getElementById('modalTitle').textContent = '编辑角色';
    document.getElementById('submitBtn').textContent = '保存修改';
    document.getElementById('editId').value = c.id;
    document.getElementById('name').value = c.name;
    document.getElementById('alias').value = c.alias || '';
    document.getElementById('university').value = c.university || '';
    document.getElementById('region').value = c.region || '';
    document.getElementById('namingRationale').value = c.naming_rationale || '';
    document.getElementById('height').value = c.height || '';
    document.getElementById('gender').value = c.gender || '';
    document.getElementById('birthday').value = c.birthday || '';
    document.getElementById('appearance').value = c.appearance || '';
    document.getElementById('identityPeriod').value = c.identity_period || '';
    document.getElementById('birthTime').value = c.birth_time || '';
    document.getElementById('birthplace').value = c.birthplace || '';
    document.getElementById('status').value = c.status || '存在';
    document.getElementById('setting').value = c.setting || '';
    
    // 处理图片预览（多图）
    resetImageUpload();
    currentImageUrls = normalizeImages(c);
    renderImagePreview();
    
    document.getElementById('modalOverlay').classList.add('active');
  } catch (e) {
    showToast('获取数据失败', 'error');
  }
}

async function submitForm(e) {
  e.preventDefault();
  const form = document.getElementById('charForm');
  if (!form.checkValidity()) { form.reportValidity(); return; }
  const editId = document.getElementById('editId').value;
  const data = {
    name: document.getElementById('name').value.trim(),
    alias: document.getElementById('alias').value.trim(),
    university: document.getElementById('university').value.trim(),
    region: document.getElementById('region').value.trim(),
    naming_rationale: document.getElementById('namingRationale').value.trim(),
    height: document.getElementById('height').value.trim(),
    gender: document.getElementById('gender').value,
    birthday: document.getElementById('birthday').value.trim(),
    appearance: document.getElementById('appearance').value.trim(),
    identity_period: document.getElementById('identityPeriod').value.trim(),
    birth_time: document.getElementById('birthTime').value.trim(),
    birthplace: document.getElementById('birthplace').value.trim(),
    status: document.getElementById('status').value,
    setting: document.getElementById('setting').value.trim(),
  };

  try {
    // 上传新选择的图片文件（统一用通用接口拿URL，随表单提交 images 数组）
    const newUrls = [];
    for (const item of currentImageFiles) {
      const formData = new FormData();
      formData.append('file', item.file);
      const uploadRes = await fetch('/api/images/upload', { method: 'POST', body: formData });
      if (uploadRes.ok) {
        const r = await uploadRes.json();
        newUrls.push(r.image_url);
      } else {
        showToast('图片上传失败，请重试', 'error');
        return;
      }
    }
    // 合并：已上传URL + 新上传URL，作为 images 数组提交
    const allImages = [...currentImageUrls, ...newUrls];
    if (allImages.length > 0) {
      data.images = allImages;
      data.image_url = allImages[0];
    } else {
      data.images = [];
      data.image_url = '';
    }

    const url = editId ? `${API}/${editId}` : API;
    const method = editId ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
    if (!res.ok) throw new Error();
    closeModal();
    resetImageUpload();
    loadCharacters();
    showToast(editId ? '已更新' : '已创建', 'success');
  } catch (e) {
    showToast('操作失败', 'error');
  }
}

function openDeleteModal(id, name) {
  deleteTargetId = id;
  document.getElementById('deleteName').textContent = name;
  document.getElementById('deleteOverlay').classList.add('active');
}

function closeDeleteModal() {
  document.getElementById('deleteOverlay').classList.remove('active');
  deleteTargetId = null;
}

async function confirmDelete() {
  if (!deleteTargetId) return;
  try {
    await fetch(`${API}/${deleteTargetId}`, { method: 'DELETE' });
    closeDeleteModal();
    loadCharacters();
    showToast('已删除', 'success');
  } catch (e) {
    showToast('删除失败', 'error');
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

document.getElementById('deleteOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDeleteModal();
});

let detailCharId = null;

async function openDetailModal(id) {
  try {
    const res = await fetch(`${API}/${id}`);
    const c = await res.json();
    detailCharId = c.id;
    document.getElementById('detailName').textContent = c.name;
    
    // 图片显示（翻页器，支持多图）
    detailImages = normalizeImages(c);
    detailImageIdx = 0;
    renderDetailImage();
    
    let body = '';
    if (c.university) body += detailSection('代表高校', c.university);
    if (c.alias) body += detailSection('别名', c.alias);
    if (c.region) body += detailSection('地区', c.region);
    if (c.birthplace) body += detailSection('诞生地', c.birthplace);
    const statusText = c.status || '存在';
    if (statusText !== '存在') body += detailSection('存在状态', statusText);
    body += `<div class="detail-info-row">`;
    if (c.height) body += detailSection('身高', c.height);
    if (c.gender) body += detailSection('性别', c.gender);
    if (c.birthday) body += detailSection('生日', c.birthday);
    body += `</div>`;
    if (c.appearance) body += detailSection('外貌', c.appearance);
    if (c.identity_period) body += detailSection('身份存在时间', c.identity_period);
    if (c.birth_time) body += detailSection('诞生时间', c.birth_time);
    if (c.naming_rationale) body += detailSection('取名依据', c.naming_rationale);
    if (c.setting) body += detailSection('设定', c.setting);
    document.getElementById('detailBody').innerHTML = body;
    document.getElementById('detailOverlay').classList.add('active');
  } catch (e) {
    showToast('获取详情失败', 'error');
  }
}

function detailSection(label, value) {
  return `<div class="detail-section"><div class="detail-label">${label}</div><div class="detail-value">${esc(value)}</div></div>`;
}

function closeDetailModal() {
  document.getElementById('detailOverlay').classList.remove('active');
  detailCharId = null;
}

function detailEdit() {
  if (detailCharId) {
    const id = detailCharId;  // 先保存 id，避免被 closeDetailModal 重置
    closeDetailModal();
    openEditModal(id);
  }
}

document.getElementById('detailOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetailModal();
});

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ====== 选择导出 ======
let exportMode = false;
const selectedIds = new Set();

function updateExportButtons() {
  var btn = document.getElementById('confirmExportBtn');
  if (!btn) return;
  btn.disabled = selectedIds.size === 0;
  btn.textContent = selectedIds.size > 0 ? '确认导出 (' + selectedIds.size + ')' : '确认导出';
}

function enterExportMode() {
  exportMode = true;
  selectedIds.clear();
  document.body.classList.add('export-mode');
  applyFilter();
}

function cancelExport() {
  exportMode = false;
  selectedIds.clear();
  document.body.classList.remove('export-mode');
  applyFilter();
}

function handleCardClick(id) {
  if (exportMode) {
    var checkbox = document.querySelector('.card[data-drag-id="' + id + '"] .card-check');
    if (checkbox) {
      checkbox.checked = !checkbox.checked;
      toggleCardSelect(id, checkbox.checked);
    }
    return;
  }
  openDetailModal(id);
}

function toggleCardSelect(id, checked) {
  if (checked) selectedIds.add(id);
  else selectedIds.delete(id);
  const card = document.querySelector('.card[data-drag-id="' + id + '"]');
  if (card) card.classList.toggle('selected', checked);
  updateExportButtons();
}

function toggleSelectAll() {
  const cards = document.querySelectorAll('#charGrid .card[data-drag-id]');
  if (cards.length === 0) return;
  const visibleIds = [];
  cards.forEach(function(c) { visibleIds.push(parseInt(c.dataset.dragId)); });
  const allSelected = visibleIds.every(function(id) { return selectedIds.has(id); });
  if (allSelected) {
    visibleIds.forEach(function(id) { selectedIds.delete(id); });
  } else {
    visibleIds.forEach(function(id) { selectedIds.add(id); });
  }
  applyFilter();
}

function confirmExport() {
  if (selectedIds.size === 0) return;
  var selected = allCharacters.filter(function(c) { return selectedIds.has(c.id); });
  // 导出时剔除图片字段
  var exportData = selected.map(function(c) {
    var rest = Object.assign({}, c);
    delete rest.image_url;
    delete rest.images;
    return rest;
  });
  var jsonStr = JSON.stringify(exportData, null, 2);
  var fileName = '高校拟人OC_' + selected.length + '位角色_' + new Date().toISOString().slice(0,10) + '.json';
  saveExportFile(jsonStr, fileName, '已导出 ' + selected.length + ' 位角色');
  cancelExport();
}

function saveExportFile(jsonStr, fileName, msg) {
  if (typeof Android !== 'undefined' && Android.saveFile) {
    var blob = new Blob([jsonStr], {type: 'application/json'});
    var reader = new FileReader();
    reader.onloadend = function() { Android.saveFile(reader.result, fileName); };
    reader.readAsDataURL(blob);
    showToast('请选择保存位置', 'success');
  } else {
    var blob = new Blob([jsonStr], {type: 'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast(msg, 'success');
  }
}

// ============================================================
// 触控拖拽排序
// ============================================================
let _tdEnabled = false, _tdEl = null, _tdGhost = null, _tdIdx = -1;
let _tdStartY = 0, _tdStartX = 0, _tdCurY = 0, _tdTimer = null;
let _tdListEl = null;

function _tdCreateGhost() {
  if (!_tdEl) return;
  const rect = _tdEl.getBoundingClientRect();
  _tdGhost = _tdEl.cloneNode(true);
  Object.assign(_tdGhost.style, {
    position:'fixed', zIndex:'9999', width:rect.width+'px', left:rect.left+'px',
    top:(_tdCurY - rect.height/2)+'px', opacity:'0.94', transform:'scale(1.03)',
    boxShadow:'0 8px 28px rgba(0,0,0,.2)', pointerEvents:'none', transition:'none',
    borderRadius:'12px', background:'#fffef9'
  });
  _tdGhost.querySelector('.drag-handle')?.remove();
  document.body.appendChild(_tdGhost);
  _tdEl.classList.add('dragging');
}

function _tdFindTargetIdx(y) {
  let bestIdx = _tdIdx, bestDist = Infinity;
  [..._tdListEl.querySelectorAll('[data-drag-id]:not(.dragging)')].forEach(item => {
    const rect = item.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    const dist = Math.abs(y - mid);
    if (dist < bestDist) { bestDist = dist; bestIdx = parseInt(item.dataset.dragIdx); }
  });
  return bestDist < 40 ? bestIdx : _tdIdx;
}

function _tdSwap(fromIdx, toIdx) {
  if (fromIdx === toIdx) return;
  const item = allCharacters.splice(fromIdx, 1)[0];
  allCharacters.splice(toIdx, 0, item);
}

function initTouchDrag() {
  _tdListEl = document.getElementById('charGrid');
  if (!_tdListEl) return;

  _tdListEl.addEventListener('touchstart', function(e) {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    const card = handle.closest('[data-drag-id]');
    if (!card) return;

    _tdEl = card;
    _tdIdx = parseInt(card.dataset.dragIdx);
    _tdStartX = e.touches[0].clientX;
    _tdStartY = e.touches[0].clientY;
    _tdCurY = _tdStartY;

    _tdTimer = setTimeout(() => {
      _tdEnabled = true;
      _tdCreateGhost();
      if (navigator.vibrate) navigator.vibrate(10);
    }, 400);
  }, {passive: false});

  _tdListEl.addEventListener('touchmove', function(e) {
    if (!_tdEnabled) {
      if (_tdTimer && (Math.abs(e.touches[0].clientY - _tdStartY) > 8 || Math.abs(e.touches[0].clientX - _tdStartX) > 8)) {
        clearTimeout(_tdTimer); _tdTimer = null; _tdEl = null; _tdIdx = -1;
      }
      return;
    }
    e.preventDefault();
    _tdCurY = e.touches[0].clientY;
    if (_tdGhost) {
      _tdGhost.style.top = (_tdCurY - _tdGhost.offsetHeight / 2) + 'px';
    }

    const edge = 70;
    if (_tdCurY < edge) window.scrollBy(0, -6);
    else if (_tdCurY > window.innerHeight - edge) window.scrollBy(0, 6);

    const newIdx = _tdFindTargetIdx(_tdCurY);
    if (newIdx !== _tdIdx) {
      _tdSwap(_tdIdx, newIdx);
      _tdIdx = newIdx;
      applyFilter();
      const newCard = _tdListEl.querySelector(`[data-drag-idx="${_tdIdx}"]`);
      if (newCard) {
        _tdEl = newCard;
        _tdEl.classList.add('dragging');
      }
      if (_tdGhost) { _tdGhost.remove(); _tdCreateGhost(); }
    }
  }, {passive: false});

  _tdListEl.addEventListener('touchend', _tdEndDrag);
  _tdListEl.addEventListener('touchcancel', _tdEndDrag);
}

function _tdEndDrag() {
  clearTimeout(_tdTimer); _tdTimer = null;
  if (_tdEnabled) {
    _tdEnabled = false;
    if (_tdGhost) { _tdGhost.remove(); _tdGhost = null; }
    if (_tdEl) { _tdEl.classList.remove('dragging'); _tdEl = null; }
    saveCharOrder();
    applyFilter();
  }
  _tdEl = null; _tdIdx = -1;
}

async function saveCharOrder() {
  try {
    await fetch(`${API}/reorder`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: allCharacters.map((c, i) => ({ id: c.id, sort_order: i })) }),
    });
  } catch(e) { /* 静默失败 */ }
}

function moveCharUp(id) {
  const idx = allCharacters.findIndex(c => c.id === id);
  if (idx <= 0) return;
  [allCharacters[idx - 1], allCharacters[idx]] = [allCharacters[idx], allCharacters[idx - 1]];
  saveCharOrder();
  applyFilter();
}

function moveCharDown(id) {
  const idx = allCharacters.findIndex(c => c.id === id);
  if (idx < 0 || idx >= allCharacters.length - 1) return;
  [allCharacters[idx + 1], allCharacters[idx]] = [allCharacters[idx], allCharacters[idx + 1]];
  saveCharOrder();
  applyFilter();
}
