<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关系网 · 高校拟人OC</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf8f6;
    --card-bg: #fffef9;
    --text: #3d322b;
    --text-light: #8c7b6e;
    --accent: #6b4c8a;
    --accent-light: #9b7ec4;
    --accent-pale: #f0e8f8;
    --danger: #c0392b;
    --danger-bg: #fce4e4;
    --border: #e0d5c7;
    --shadow: 0 2px 16px rgba(60,40,20,.08);
    --shadow-lg: 0 8px 40px rgba(60,40,20,.12);
    --radius: 14px;
    --radius-sm: 8px;
    --font-serif: 'Georgia', 'Noto Serif SC', 'SimSun', serif;
    --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --transition: 0.25s cubic-bezier(.4,0,.2,1);
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(155,126,196,.05) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(107,76,138,.04) 0%, transparent 60%);
  }

  /* ====== Header ====== */
  .header {
    background: linear-gradient(135deg, #2b1f3d 0%, #3e2b5a 40%, #55437a 100%);
    color: #f0e8f8;
    padding: 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.025'%3E%3Cpath d='M30 30L36 24M30 30L36 36M30 30L24 36M30 30L24 24' stroke='%23ffffff' stroke-opacity='0.06' stroke-width='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  .header h1 {
    font-family: var(--font-serif);
    font-size: 1.8rem;
    font-weight: 400;
    letter-spacing: 0.06em;
  }
  .header .subtitle {
    margin-top: 4px; font-size: .88rem;
    opacity: .65; letter-spacing: .08em;
  }

  /* ====== 侧边栏布局 ====== */
  .app-layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 180px;
    background: linear-gradient(180deg, #2a1a12 0%, #1a0e08 100%);
    color: #f5ede4;
    display: flex; flex-direction: column;
    transition: width 0.3s cubic-bezier(.4,0,.2,1);
    flex-shrink: 0; overflow: hidden;
    position: sticky; top: 0; height: 100vh; z-index: 10;
    box-shadow: 2px 0 16px rgba(0,0,0,.15);
  }
  .sidebar.collapsed { width: 54px; }
  .sidebar-toggle {
    background: none; border: none; color: #b8a090; font-size: 1.2rem;
    padding: 14px 16px 6px; cursor: pointer; transition: var(--transition);
    text-align: left; letter-spacing: .04em;
  }
  .sidebar.collapsed .sidebar-toggle { text-align: center; padding-left: 0; padding-right: 0; }
  .sidebar-toggle:hover { color: #fff; }
  .sidebar-nav { display: flex; flex-direction: column; padding: 8px; gap: 3px; flex: 1; }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 8px; color: #c8b8a8; text-decoration: none;
    font-size: .88rem; font-family: var(--font-sans); transition: var(--transition); white-space: nowrap;
  }
  .sidebar-item:hover { background: rgba(255,255,255,.06); color: #f5ede4; }
  .sidebar-item.active { background: rgba(139,94,60,.3); color: #f5ede4; font-weight: 500; }
  .sidebar-icon { font-size: 1.15rem; flex-shrink: 0; width: 22px; text-align: center; }
  .sidebar-text { transition: opacity 0.2s, width 0.2s; overflow: hidden; }
  .sidebar.collapsed .sidebar-text { opacity: 0; width: 0; }
  .sidebar.collapsed .sidebar-item { gap: 0; justify-content: center; padding: 10px 0; }
  .sidebar-footer {
    padding: 12px; border-top: 1px solid rgba(255,255,255,.08); text-align: center;
  }
  .sidebar.collapsed .sidebar-footer { display: none; }
  .main-content { flex: 1; min-width: 0; display: flex; flex-direction: column; }

  /* ====== Container ====== */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px 40px;
    width: 100%;
  }

  /* ====== 图形区域 ====== */
  .graph-section {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 24px;
    overflow: hidden;
  }
  .graph-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .graph-header .hint {
    font-size: .82rem;
    color: var(--text-light);
  }
  .graph-canvas-wrap {
    position: relative;
    width: 100%;
    height: 480px;
    background: radial-gradient(ellipse at center, #faf8f6 0%, #ece5dd 100%);
  }
  .graph-canvas-wrap canvas {
    display: block;
    cursor: default;
  }
  .graph-legend {
    display: flex;
    gap: 14px;
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: .78rem; color: var(--text-light);
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid currentColor;
  }

  /* ====== 按钮 ====== */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border: none; border-radius: var(--radius-sm);
    font-size: .88rem; font-family: var(--font-sans); cursor: pointer;
    transition: var(--transition); font-weight: 500; letter-spacing: .02em;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #5a3e78; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(107,76,138,.3); }
  .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent-light); }
  .btn-outline:hover { background: var(--accent-pale); }
  .btn-sm { padding: 5px 12px; font-size: .8rem; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #a93226; }
  .btn-ghost { background: transparent; color: var(--text-light); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--accent-pale); }

  /* ====== 关系列表 ====== */
  .section-title {
    font-family: var(--font-serif);
    font-size: 1.15rem;
    color: var(--accent);
    margin-bottom: 14px;
    letter-spacing: .04em;
  }
  .rel-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .rel-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    transition: var(--transition);
    cursor: pointer;
  }
  .rel-item:hover { border-color: var(--accent-light); box-shadow: var(--shadow); }
  .rel-item.highlight { border-color: var(--accent); background: var(--accent-pale); }
  .rel-item.dragging { opacity: 0.4; }
  .rel-item.drag-over { border-color: var(--accent); border-style: dashed; background: var(--accent-pale); }
  .drag-handle { cursor: grab; color: var(--text-light); font-size: 1.2rem; user-select: none; flex-shrink: 0; }
  .drag-handle:active { cursor: grabbing; }
  .rel-info { flex: 1; min-width: 0; }
  .rel-names { font-weight: 600; font-size: .93rem; }
  .rel-names .arrow { color: var(--accent-light); margin: 0 6px; }
  .rel-type {
    display: inline-block;
    font-size: .78rem;
    padding: 2px 10px;
    border-radius: 12px;
    background: var(--accent-pale);
    color: var(--accent);
    margin-left: 8px;
    font-weight: 500;
  }
  .rel-type-cp { background: #fce4ec; color: #c44b7a; }
  .rel-type-memory { background: #e0f2f1; color: #2e8b8a; }
  .rel-type-formation { background: #fdf0e0; color: #d4842a; }
  .rel-type-teacher { background: #e3edf7; color: #4a7db0; }
  .rel-type-friend { background: #2ecc71; color: #2ecc71; }
  .rel-type-enemy { background: #e67e22; color: #e67e22; }
  .rel-type-family { background: #2ecc71; color: #2ecc71; }
  .info-label { width: 90px; font-weight: 500; color: var(--text-light); vertical-align: top; padding: 3px 12px 3px 0; white-space: nowrap; font-size: .85rem; }
  .info-label + td { padding: 3px 0; }
  .rel-desc { font-size: .82rem; color: var(--text-light); margin-top: 2px; }
  .rel-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .empty {
    text-align: center; padding: 60px 20px; color: var(--text-light);
  }
  .empty .icon { font-size: 3rem; margin-bottom: 10px; opacity: .5; }
  .empty p { font-size: .95rem; }

  /* ====== Modal ====== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(30,18,8,.45);
    backdrop-filter: blur(4px); z-index: 1000;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; visibility: hidden; transition: var(--transition);
  }
  .modal-overlay.active { opacity: 1; visibility: visible; }
  .modal {
    background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow-lg);
    width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
    transform: translateY(20px); transition: var(--transition);
  }
  .modal-overlay.active .modal { transform: translateY(0); }
  .modal-header {
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; background: var(--card-bg); z-index: 2;
  }
  .modal-header h2 {
    font-family: var(--font-serif); font-size: 1.2rem; font-weight: 600; color: #3d2b1f;
  }
  .modal-close {
    width: 32px; height: 32px; border: none; background: #f5f0eb;
    border-radius: 50%; cursor: pointer; font-size: 1rem; color: var(--text-light);
    display: flex; align-items: center; justify-content: center; transition: var(--transition);
  }
  .modal-close:hover { background: #e8ddd0; color: var(--text); }
  .modal-body { padding: 20px 24px; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: .83rem; font-weight: 600; color: var(--accent);
    margin-bottom: 4px; letter-spacing: .03em;
  }
  .form-group select, .form-group input, .form-group textarea {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: .9rem; font-family: var(--font-sans);
    background: #fefdf9; color: var(--text); transition: var(--transition); resize: vertical;
  }
  .form-group select:focus, .form-group input:focus, .form-group textarea:focus {
    outline: none; border-color: var(--accent-light); box-shadow: 0 0 0 3px rgba(155,126,196,.12);
  }
  .form-group textarea { min-height: 70px; }
  .char-search {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: .9rem; font-family: var(--font-sans);
    background: #fefdf9; color: var(--text); transition: var(--transition);
    margin-bottom: 4px;
  }
  .char-search:focus { outline: none; border-color: var(--accent-light); box-shadow: 0 0 0 3px rgba(155,126,196,.12); }
  .modal-footer {
    padding: 14px 24px 20px; display: flex; justify-content: flex-end; gap: 10px;
  }

  /* ====== Toast ====== */
  .toast {
    position: fixed; top: 20px; right: 20px; z-index: 2000;
    padding: 12px 24px; border-radius: var(--radius-sm);
    background: #2d2a26; color: #f5ede4; font-size: .9rem;
    box-shadow: var(--shadow-lg); transform: translateX(120%);
    transition: var(--transition); max-width: 380px;
  }
  .toast.show { transform: translateX(0); }
  .toast.success { background: #2d5a27; }
  .toast.error { background: var(--danger); }

  @media (max-width: 768px) {
    .header h1 { font-size: 1.4rem; }
    .graph-canvas-wrap { height: 340px; }
  }
</style>
</head>
<body>
<div class="app-layout">

<aside class="sidebar" id="sidebar">
  <button class="sidebar-toggle" onclick="toggleSidebar()" title="展开/收起侧边栏">☰</button>
  <nav class="sidebar-nav">
    <a href="/" class="sidebar-item">
      <span class="sidebar-icon">📖</span><span class="sidebar-text">角色设定</span>
    </a>
    <a href="/worldview" class="sidebar-item">
      <span class="sidebar-icon">🌍</span><span class="sidebar-text">世界观设定</span>
    </a>
    <a href="/relations" class="sidebar-item active">
      <span class="sidebar-icon">🔗</span><span class="sidebar-text">关系网</span>
    </a>
    <a href="/documents" class="sidebar-item">
      <span class="sidebar-icon">📄</span><span class="sidebar-text">文档管理</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <span style="font-size:.75rem;opacity:.5;">高校拟人OC</span>
  </div>
</aside>

<div class="main-content">

<header class="header">
  <h1>关系网</h1>
  <p class="subtitle">角色之间的关系图谱 · 可视化 & 管理</p>
</header>

<div class="container">
  <!-- 图形区域 -->
  <div class="graph-section">
    <div class="graph-header">
      <span class="hint">💡 拖拽节点调整位置 · 双击查看角色 · 滚轮缩放</span>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline btn-sm" onclick="openFamilyModal()">🏛 管理家族</button>

      </div>
    </div>
    <div class="graph-canvas-wrap" id="canvasWrap">
      <canvas id="graphCanvas"></canvas>
    </div>
    <div class="graph-legend" id="graphLegend">
      <div class="legend-item"><span class="legend-dot" style="background:#6b4c8a;border-color:#6b4c8a;"></span> 男</div>
      <div class="legend-item"><span class="legend-dot" style="background:#c44b7a;border-color:#c44b7a;"></span> 女</div>
      <div class="legend-item"><span class="legend-dot" style="background:#4b8a6b;border-color:#4b8a6b;"></span> 其他</div>
      <div class="legend-item"><span style="color:#c44b7a;">⇄</span> CP</div>
      <div class="legend-item"><span style="color:#6b4c8a;margin-left:8px;">━━</span> 单箭头</div>
      <div class="legend-item"><span style="color:#2e8b8a;margin-left:4px;">┅┅</span> 继承记忆</div>
      <div class="legend-item"><span style="color:#d4842a;margin-left:8px;">━━</span> 参与组建</div>
      <div class="legend-item"><span style="color:#4a7db0;margin-left:8px;">━━</span> 师生</div>
      <div class="legend-item"><span style="color:#2ecc71;margin-left:8px;">⇄</span> 朋友</div>
      <div class="legend-item"><span style="color:#e67e22;margin-left:8px;">⇄</span> 冤家</div>
      <div class="legend-item"><span style="color:#2ecc71;margin-left:8px;">⇄</span> 亲属</div>
      <div class="legend-item" style="margin-left:16px;color:var(--text-light);">|</div>
    </div>
  </div>

  <!-- 工具栏 -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
    <h2 class="section-title" style="margin-bottom:0;">所有关系</h2>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <input type="text" id="relSearchInput" class="char-search" style="width:220px;"
             placeholder="🔍 搜索关系（角色名/类型/描述）…"
             oninput="renderRelList()" autocomplete="off">
      <button class="btn btn-primary" onclick="openCreateModal()">＋ 添加关系</button>
    </div>
  </div>

  <div class="rel-list" id="relList"></div>
  <div class="empty" id="emptyState">
    <div class="icon">🔗</div>
    <p>还没有建立角色关系，点击上方按钮添加吧</p>
  </div>
</div>

</div><!-- /main-content -->
</div><!-- /app-layout -->

<!-- ====== 添加/编辑关系 Modal ====== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">添加关系</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="relForm" onsubmit="submitForm(event)">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="fromCharSearch">角色A *</label>
          <input type="text" class="char-search" id="fromCharSearch" placeholder="🔍 输入名称搜索…" oninput="filterSelect(this, 'fromChar')" autocomplete="off">
          <select id="fromChar" required size="6" style="width:100%;" onchange="onCharSelect(this, 'fromCharSearch')"></select>
        </div>
        <div class="form-group">
          <label for="toCharSearch">角色B *</label>
          <input type="text" class="char-search" id="toCharSearch" placeholder="🔍 输入名称搜索…" oninput="filterSelect(this, 'toChar')" autocomplete="off">
          <select id="toChar" required size="6" style="width:100%;" onchange="onCharSelect(this, 'toCharSearch')"></select>
        </div>
        <div class="form-group">
          <label for="relType">关系类型</label>
          <select id="relType" required>
            <option value="">-- 选择 --</option>
            <option value="CP">CP</option>
            <option value="单箭头">单箭头</option>
            <option value="继承记忆">继承记忆</option>
            <option value="参与组建">参与组建</option>
            <option value="师生">师生</option>
            <option value="朋友">朋友</option>
            <option value="冤家">冤家</option>
          </select>
        </div>
        <div class="form-group">
          <label for="relDesc">关系描述</label>
          <textarea id="relDesc" rows="2" placeholder="补充说明两人关系的细节…"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitForm(event)">确认添加</button>
    </div>
  </div>
</div>

<!-- ====== 删除确认 Modal ====== -->
<div class="modal-overlay" id="deleteOverlay" style="z-index:2000;">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <h2>确认删除</h2>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <div class="modal-body" style="text-align:center; padding: 24px;">
      <p style="font-size:1rem; margin-bottom:4px;">确定要删除关系 <strong id="deleteRelInfo" style="color:var(--danger);"></strong> 吗？</p>
      <p style="font-size:.82rem; color:var(--text-light);">此操作无法撤销</p>
    </div>
    <div class="modal-footer" style="justify-content:center;">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">取消</button>
      <button class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
    </div>
  </div>
</div>

<!-- ====== 角色信息 Modal ====== -->
<div class="modal-overlay" id="infoOverlay">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <h2 id="infoName"></h2>
      <button class="modal-close" onclick="closeInfoModal()">✕</button>
    </div>
    <div class="modal-body" id="infoBody" style="text-align:left;max-height:60vh;overflow-y:auto;"></div>
    <div class="modal-footer" style="justify-content:center;">
      <button class="btn btn-primary btn-sm" onclick="startRelationFromInfo()">＋ 添加与此角色的关系</button>
      <button class="btn btn-ghost btn-sm" onclick="closeInfoModal()">关闭</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ====== 家族管理 Modal ====== -->
<div class="modal-overlay" id="familyOverlay">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <h2>🏛 家族管理</h2>
      <button class="modal-close" onclick="closeFamilyModal()">✕</button>
    </div>
    <div class="modal-body" id="familyBody" style="max-height:60vh;overflow-y:auto;"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveFamilies()">💾 保存全部</button>
      <button class="btn btn-ghost" onclick="closeFamilyModal()">关闭</button>
    </div>
  </div>
</div>

<script>
const API_REL = '/api/relations';
const API_CHAR = '/api/characters';
let allRelations = [];
let allCharacters = [];
let deleteTargetId = null;
let selectedFromCharId = null;

// 家族颜色配置
const FAMILY_COLORS = [
  '#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6',
  '#1abc9c', '#e67e22', '#2980b9', '#27ae60', '#8e44ad',
  '#e91e63', '#00bcd4', '#ff5722', '#607d8b', '#cddc39',
  '#795548', '#673ab7', '#009688', '#ff9800', '#3f51b5',
];
let familyColorMap = {};  // family名 → 颜色
let familyEditMap = {};   // 家族编辑临时存储 charId → family名

// Graph state
let nodes = [];       // {id, name, gender, x, y, r}
let edges = [];       // {id, from, to, type, desc}
let nodeMap = {};
let dragNode = null;
let dragOffX = 0, dragOffY = 0;
let offsetX = 0, offsetY = 0;
let scale = 1;
const pinnedPos = new Map();  // id → {x, y} 手动拖动过的节点位置
let canvas, ctx, cw, ch;

document.addEventListener('DOMContentLoaded', () => {
  loadData();
});

async function loadData() {
  try {
    const [relRes, charRes] = await Promise.all([
      fetch(API_REL),
      fetch(API_CHAR)
    ]);
    allRelations = await relRes.json();
    allCharacters = await charRes.json();

    buildNodeMap();
    buildEdges();
    renderRelList();
    initCanvas();
    drawGraph();
    updateFamilyLegend();
  } catch(e) {
    console.error('加载失败:', e.message, e.stack);
    showToast('加载失败: ' + e.message, 'error');
  }
}

function buildNodeMap() {
  nodeMap = {};
  allCharacters.forEach(c => {
    nodeMap[c.id] = c;
  });
  buildFamilyColors();
}

function buildFamilyColors() {
  familyColorMap = {};
  let colorIdx = 0;
  allCharacters.forEach(c => {
    const fams = splitFamilies(c.family || '');
    fams.forEach(fam => {
      if (fam && !(fam in familyColorMap)) {
        familyColorMap[fam] = FAMILY_COLORS[colorIdx % FAMILY_COLORS.length];
        colorIdx++;
      }
    });
  });
}

function splitFamilies(famStr) {
  return (famStr || '').split(/[、,，]/).map(s => s.trim()).filter(Boolean);
}

function getFamilyColor(node) {
  const fams = splitFamilies(node.family || '');
  return fams.length > 0 ? familyColorMap[fams[0]] : null;
}

function getNodeFamilies(node) {
  return splitFamilies(node.family || '');
}

function updateFamilyLegend() {
  const legend = document.getElementById('graphLegend');
  // 重建家族图例
  const families = Object.keys(familyColorMap);
  let famHtml = '';
  families.forEach(fam => {
    const color = familyColorMap[fam];
    famHtml += `<div class="legend-item fam-legend"><span class="legend-dot" style="background:${color};border-color:${color};"></span> ${fam}</div>`;
  });
  legend.querySelectorAll('.fam-legend').forEach(el => el.remove());
  if (famHtml) legend.insertAdjacentHTML('beforeend', famHtml);
}

function buildEdges() {
  edges = allRelations.map(r => ({
    id: r.id,
    from: r.from_char_id,
    to: r.to_char_id,
    type: r.relation_type || '关联',
    desc: r.description || '',
  }));
}

// --- Canvas Graph ---
function initCanvas() {
  canvas = document.getElementById('graphCanvas');
  const wrap = document.getElementById('canvasWrap');
  cw = wrap.clientWidth;
  ch = wrap.clientHeight;
  canvas.width = cw * window.devicePixelRatio;
  canvas.height = ch * window.devicePixelRatio;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  // 恢复上次保存的拖拽位置
  const saved = localStorage.getItem('graphPinnedPos');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      for (const [k, v] of Object.entries(data)) {
        pinnedPos.set(Number(k), v);
      }
    } catch(e) {}
  }

  // 计算初始布局
  computeLayout();

  // Events
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('wheel', onWheel, {passive: false});
  canvas.addEventListener('dblclick', onDblClick);

  window.addEventListener('resize', () => {
    const wrap = document.getElementById('canvasWrap');
    cw = wrap.clientWidth; ch = wrap.clientHeight;
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    canvas.width = cw * window.devicePixelRatio;
    canvas.height = ch * window.devicePixelRatio;
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    drawGraph();  // 只重绘，保持节点位置
  });
}

function computeLayout() {
  nodes = [];
  const chars = allCharacters;
  if (chars.length === 0) return;

  const cx = cw / 2 + offsetX;
  const cy = ch / 2 + offsetY;
  const nodeR = 28;
  const minGap = 14;
  const clusterPad = 24;

  // ====== 1. 每个角色属于所有家族（非仅第一个） ======
  const charFams = {};          // charId → [家族名]
  const famMemberSet = {};      // 家族名 → Set(charId) 用于重叠计算
  const famMembers = {};        // 家族名 → [char] 用于有序放置
  const noFamily = [];

  chars.forEach(c => {
    const fams = splitFamilies(c.family || '');
    charFams[c.id] = fams;
    if (fams.length === 0) {
      noFamily.push(c);
    } else {
      fams.forEach(f => {
        if (!famMemberSet[f]) { famMemberSet[f] = new Set(); famMembers[f] = []; }
        famMemberSet[f].add(c.id);
        famMembers[f].push(c);
      });
    }
  });

  const allFams = Object.keys(famMembers);

  // ====== 2. 构建家族重叠图 + 连通分量 ======
  const overlaps = {};
  allFams.forEach(f => { overlaps[f] = []; });
  for (let i = 0; i < allFams.length; i++) {
    for (let j = i + 1; j < allFams.length; j++) {
      const setI = famMemberSet[allFams[i]];
      const setJ = famMemberSet[allFams[j]];
      const [smallS, bigS] = setI.size < setJ.size ? [setI, setJ] : [setJ, setI];
      for (const id of smallS) { if (bigS.has(id)) { overlaps[allFams[i]].push(allFams[j]); overlaps[allFams[j]].push(allFams[i]); break; } }
    }
  }

  // 重叠关系存于 overlaps，力模拟用到

  // ====== 3. 辅助 ======
  function calcMemberR(n) {
    if (n <= 1) return 0;
    if (n === 2) return nodeR + minGap / 2;
    return (nodeR * 2 + minGap) / (2 * Math.sin(Math.PI / n));
  }

  // ====== 4. 计算每个家族的成员圈 + 集群半径 ======
  const famMR = {};  // member circle radius
  const famCR = {};  // cluster bounding radius (mR + nodeR + pad)
  allFams.forEach(f => {
    const n = famMemberSet[f].size;
    famMR[f] = calcMemberR(n);
    famCR[f] = famMR[f] + nodeR + clusterPad;
  });

  // ====== 5. 力导向布局：放置各家族中心 ======
  const famCenter = {};  // fam → {x, y, r}
  allFams.forEach(f => {
    // 初始随机散布
    const a = Math.random() * 2 * Math.PI;
    const d = Math.random() * 80;
    famCenter[f] = { x: cx + d * Math.cos(a), y: cy + d * Math.sin(a), r: famMR[f] };
  });

  // 力模拟迭代
  const forces = {};
  const iters = 200;
  for (let iter = 0; iter < iters; iter++) {
    const cool = (iters - iter) / iters;  // 逐渐冷却
    allFams.forEach(f => { forces[f] = { fx: 0, fy: 0 }; });

    // 对所有家族对施加力
    for (let i = 0; i < allFams.length; i++) {
      for (let j = i + 1; j < allFams.length; j++) {
        const f1 = allFams[i], f2 = allFams[j];
        const c1 = famCenter[f1], c2 = famCenter[f2];
        const dx = c2.x - c1.x, dy = c2.y - c1.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const ndx = dx / dist, ndy = dy / dist;
        const minDist = famCR[f1] + famCR[f2] + 40;

        if (overlaps[f1].includes(f2)) {
          // 共享角色 → 强吸引力聚拢
          const shared = [...famMemberSet[f1]].filter(id => famMemberSet[f2].has(id)).length;
          const pull = Math.min(shared * 0.6, 2) * (dist > minDist * 2 ? 0.15 : dist > minDist ? 0.05 : -0.1);
          forces[f1].fx += ndx * pull;
          forces[f1].fy += ndy * pull;
          forces[f2].fx -= ndx * pull;
          forces[f2].fy -= ndy * pull;
        } else if (dist < minDist * 3) {
          // 无共享 → 排斥力推开
          const push = Math.max(0, (minDist - dist)) * 0.04;
          forces[f1].fx -= ndx * push;
          forces[f1].fy -= ndy * push;
          forces[f2].fx += ndx * push;
          forces[f2].fy += ndy * push;
        }
      }
    }

    // 中心引力
    allFams.forEach(f => {
      forces[f].fx += (cx - famCenter[f].x) * 0.015;
      forces[f].fy += (cy - famCenter[f].y) * 0.015;
    });

    // 阻尼
    allFams.forEach(f => {
      forces[f].fx *= 0.9;
      forces[f].fy *= 0.9;
      famCenter[f].x += forces[f].fx * cool;
      famCenter[f].y += forces[f].fy * cool;
    });
  }

  // ====== 7. 计算每个角色的位置 ======
  const posMap = {};  // charId → {x, y}

  chars.forEach(c => {
    const fams = charFams[c.id] || [];

    if (fams.length === 0) {
      posMap[c.id] = { x: 0, y: 0, noFam: true };
      return;
    }

    if (fams.length === 1) {
      // 单家族：放在该家族成员圈上
      const fc = famCenter[fams[0]];
      if (!fc) { posMap[c.id] = { x: cx, y: cy, noFam: true }; return; }
      const members = famMembers[fams[0]];  // 有序数组
      const idx = members.findIndex(m => m.id === c.id);
      const mR = famMR[fams[0]];
      const angle = members.length > 1
        ? (2 * Math.PI * idx) / members.length - Math.PI / 2
        : 0;
      posMap[c.id] = {
        x: fc.x + mR * Math.cos(angle),
        y: fc.y + mR * Math.sin(angle),
      };
    } else {
      // 多家族：放在所属家族中心的加权平均位置
      let sx = 0, sy = 0, cnt = 0;
      fams.forEach(f => {
        const fc = famCenter[f];
        if (fc) { sx += fc.x; sy += fc.y; cnt++; }
      });
      posMap[c.id] = cnt > 0 ? { x: sx / cnt, y: sy / cnt } : { x: cx, y: cy, noFam: true };
    }
  });

  // ====== 8. 力导向微调：多家族角色相互排斥，同时被家族中心吸引 ======
  const multiChars = chars.filter(c => (charFams[c.id] || []).length > 1);
  for (let iter = 0; iter < 40; iter++) {
    multiChars.forEach(c => {
      const pos = posMap[c.id];
      if (!pos || pos.noFam) return;
      let fx = 0, fy = 0;

      // 排斥其他多家族角色
      multiChars.forEach(o => {
        if (o.id === c.id) return;
        const op = posMap[o.id];
        if (!op || op.noFam) return;
        const dx = pos.x - op.x, dy = pos.y - op.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const minDist = nodeR * 2 + minGap;
        if (dist < minDist) {
          const force = (minDist - dist) / dist * 0.4;
          fx += dx * force; fy += dy * force;
        }
      });

      // 被所属家族中心吸引
      (charFams[c.id] || []).forEach(f => {
        const fc = famCenter[f];
        if (fc) {
          fx += (fc.x - pos.x) * 0.15;
          fy += (fc.y - pos.y) * 0.15;
        }
      });

      pos.x += fx; pos.y += fy;
    });
  }

  // ====== 9. 放置无家族角色：右侧竖列 ======
  if (noFamily.length > 0) {
    // 找到所有家族中心的最右边界
    let rightEdge = cx;
    allFams.forEach(f => {
      const fc = famCenter[f];
      if (fc) rightEdge = Math.max(rightEdge, fc.x + famCR[f] + 20);
    });
    const colX = rightEdge + 60;
    const gap = nodeR * 2 + minGap + 8;
    const totalH = (noFamily.length - 1) * gap;
    const startY = cy - totalH / 2;
    noFamily.forEach((c, i) => {
      posMap[c.id] = { x: colX, y: startY + i * gap };
    });
  }

  // ====== 10. 输出 nodes（恢复已手动拖动过的节点位置） ======
  chars.forEach(c => {
    const p = posMap[c.id];
    const pinned = pinnedPos.get(c.id);
    nodes.push({
      id: c.id, name: c.name, family: c.family || '',
      gender: c.gender,
      x: pinned ? pinned.x : (p ? p.x : cx),
      y: pinned ? pinned.y : (p ? p.y : cy),
      r: nodeR,
    });
  });

  // 保存数据供 drawFamilyClusters 使用
  window._famMemberSet = famMemberSet;
  window._famCenter = famCenter;
}



// ====== 凸包算法（Monotone Chain） ======
function convexHull(points) {
  if (points.length <= 2) return points;
  const sorted = points.slice().sort((a, b) => a.x - b.x || a.y - b.y);
  const lower = [];
  for (const p of sorted) {
    while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = sorted.length - 1; i >= 0; i--) {
    const p = sorted[i];
    while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
    upper.push(p);
  }
  lower.pop(); upper.pop();
  return lower.concat(upper);
}
function cross(o, a, b) { return (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x); }

function drawFamilyClusters() {
  // 每个节点贡献到【所有】所属家族的包围圈（非仅第一个）
  const famPoints = {};   // 家族名 → [{x,y}] 成员圆心
  const famNodeIds = {};  // 家族名 → Set(nodeId) 去重

  nodes.forEach(n => {
    const fams = getNodeFamilies(n);
    fams.forEach(fam => {
      if (!famPoints[fam]) { famPoints[fam] = []; famNodeIds[fam] = new Set(); }
      if (famNodeIds[fam].has(n.id)) return;
      famNodeIds[fam].add(n.id);
      famPoints[fam].push({ x: n.x, y: n.y });
    });
  });

  const pad = 12;  // 凸包外扩距离

  Object.entries(famPoints).forEach(([fam, pts]) => {
    const totalCount = window._famMemberSet?.[fam]?.size ?? 0;
    if (pts.length < 2 && totalCount < 2) return;

    const color = familyColorMap[fam] || '#ccc';
    const nodeR = 28;

    if (pts.length === 1) {
      // 单节点：画小圆
      const r = nodeR + pad;
      ctx.beginPath();
      ctx.arc(pts[0].x, pts[0].y, r, 0, Math.PI * 2);
      ctx.fillStyle = color + '0A';
      ctx.fill();
      ctx.strokeStyle = color + '44';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = color;
      ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(fam, pts[0].x, pts[0].y - r - 6);
      return;
    }

    // 为每个节点生成环绕点（节点圆上的采样点 + 外扩）
    const periPts = [];
    const samples = 8;
    pts.forEach(p => {
      for (let i = 0; i < samples; i++) {
        const a = (2 * Math.PI * i) / samples;
        periPts.push({
          x: p.x + (nodeR + pad) * Math.cos(a),
          y: p.y + (nodeR + pad) * Math.sin(a)
        });
      }
    });

    const hull = convexHull(periPts);
    if (hull.length < 3) return;

    // 画填充
    ctx.beginPath();
    ctx.moveTo(hull[0].x, hull[0].y);
    for (let i = 1; i < hull.length; i++) ctx.lineTo(hull[i].x, hull[i].y);
    ctx.closePath();
    ctx.fillStyle = color + '08';
    ctx.fill();

    // 画边框
    ctx.beginPath();
    ctx.moveTo(hull[0].x, hull[0].y);
    for (let i = 1; i < hull.length; i++) ctx.lineTo(hull[i].x, hull[i].y);
    ctx.closePath();
    ctx.strokeStyle = color + '55';
    ctx.lineWidth = 1.8;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // 标签：放在凸包几何中心偏上
    let cx = 0, cy = 0;
    hull.forEach(p => { cx += p.x; cy += p.y; });
    cx /= hull.length; cy /= hull.length;
    // 找凸包最上方的点
    let topY = Infinity;
    hull.forEach(p => { topY = Math.min(topY, p.y); });
    ctx.fillStyle = color;
    ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(fam, cx, topY - 6);
  });
}

// CP / 单箭头 / 继承记忆 / 参与组建 / 师生 / 朋友 / 冤家 / 亲属 边线渲染
function drawEdge(fromX, fromY, toX, toY, type, isBidirectional, highlight = false) {
  const dx = toX - fromX, dy = toY - fromY;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  const ux = dx / len, uy = dy / len;
  const nodeR = 28;
  const arrowSize = 8;

  // 从节点边缘起止
  const sx = fromX + ux * nodeR;
  const sy = fromY + uy * nodeR;
  const ex = toX - ux * nodeR;
  const ey = toY - uy * nodeR;

  let color;
  if (type === 'CP') color = '#c44b7a';
  else if (type === '继承记忆') color = '#2e8b8a';
  else if (type === '参与组建') color = '#d4842a';
  else if (type === '师生') color = '#4a7db0';
  else if (type === '朋友') color = '#2ecc71';
  else if (type === '冤家') color = '#e67e22';
  else if (type === '亲属') color = '#2ecc71';
  else color = '#6b4c8a';
  const alpha = highlight ? 'b3' : '55';
  const isDashed = type === '继承记忆';

  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(ex, ey);
  ctx.strokeStyle = color + alpha;
  ctx.lineWidth = highlight ? 3 : 2;
  if (isDashed) ctx.setLineDash([8, 5]);
  ctx.stroke();
  ctx.setLineDash([]);

  // 箭头函数
  function drawTip(x, y) {
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - ux * arrowSize - uy * arrowSize * 0.6, y - uy * arrowSize + ux * arrowSize * 0.6);
    ctx.lineTo(x - ux * arrowSize + uy * arrowSize * 0.6, y - uy * arrowSize - ux * arrowSize * 0.6);
    ctx.closePath();
    ctx.fillStyle = color + alpha;
    ctx.fill();
  }

  drawTip(ex, ey);  // 目标端箭头
  if (isBidirectional) {
    // 双向关系：source端也画箭头，指向源节点（从target方向来）
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + ux * arrowSize - uy * arrowSize * 0.6, sy + uy * arrowSize + ux * arrowSize * 0.6);
    ctx.lineTo(sx + ux * arrowSize + uy * arrowSize * 0.6, sy + uy * arrowSize - ux * arrowSize * 0.6);
    ctx.closePath();
    ctx.fillStyle = color + alpha;
    ctx.fill();
  }
}

function drawGraph() {
  ctx.clearRect(0, 0, cw, ch);

  // 背景网格
  ctx.strokeStyle = '#e8e0d5';
  ctx.lineWidth = 0.5;
  const gs = 40;
  for (let x = gs; x < cw; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ch); ctx.stroke();
  }
  for (let y = gs; y < ch; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke();
  }

  // 画家族聚类圈
  drawFamilyClusters();

  // 画边
  edges.forEach(edge => {
    const from = nodes.find(n => n.id === edge.from);
    const to = nodes.find(n => n.id === edge.to);
    if (!from || !to) return;

    const isBidirectional = ['CP', '朋友', '冤家', '亲属'].includes(edge.type);
    drawEdge(from.x, from.y, to.x, to.y, edge.type, isBidirectional);

    // 标签
    const mx = (from.x + to.x) / 2;
    const my = (from.y + to.y) / 2;
    const label = edge.type;
    let labelColor;
    if (edge.type === 'CP') labelColor = '#c44b7a';
    else if (edge.type === '继承记忆') labelColor = '#2e8b8a';
    else if (edge.type === '参与组建') labelColor = '#d4842a';
    else if (edge.type === '师生') labelColor = '#4a7db0';
    else if (edge.type === '朋友') labelColor = '#2ecc71';
    else if (edge.type === '冤家') labelColor = '#e67e22';
    else if (edge.type === '亲属') labelColor = '#2ecc71';
    else labelColor = '#6b4c8a';
    ctx.font = '12px "PingFang SC","Microsoft YaHei",sans-serif';
    const tw = ctx.measureText(label).width + 8;
    ctx.fillStyle = '#fff';
    ctx.fillRect(mx - tw/2, my - 9, tw, 18);
    ctx.strokeStyle = labelColor + '55';
    ctx.lineWidth = 1;
    ctx.strokeRect(mx - tw/2, my - 9, tw, 18);
    ctx.fillStyle = labelColor;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, mx, my);
  });

  // 节点头尺寸排序（小的先画）
  const sortedNodes = [...nodes];

  // 画节点
  sortedNodes.forEach(node => {
    // 光晕
    const grad = ctx.createRadialGradient(node.x, node.y, node.r * 0.6, node.x, node.y, node.r + 6);
    if (node.gender === '男') {
      grad.addColorStop(0, 'rgba(107,76,138,0.4)');
      grad.addColorStop(1, 'rgba(107,76,138,0)');
      ctx.fillStyle = '#6b4c8a';
    } else if (node.gender === '女') {
      grad.addColorStop(0, 'rgba(196,75,122,0.4)');
      grad.addColorStop(1, 'rgba(196,75,122,0)');
      ctx.fillStyle = '#c44b7a';
    } else {
      grad.addColorStop(0, 'rgba(75,138,107,0.4)');
      grad.addColorStop(1, 'rgba(75,138,107,0)');
      ctx.fillStyle = '#4b8a6b';
    }
    ctx.beginPath();
    ctx.arc(node.x, node.y, node.r + 6, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // 主体圆
    const bodyGrad = ctx.createLinearGradient(node.x - node.r, node.y - node.r, node.x + node.r, node.y + node.r);
    if (node.gender === '男') {
      bodyGrad.addColorStop(0, '#8b6fc4');
      bodyGrad.addColorStop(1, '#6b4c8a');
    } else if (node.gender === '女') {
      bodyGrad.addColorStop(0, '#e07ba4');
      bodyGrad.addColorStop(1, '#c44b7a');
    } else {
      bodyGrad.addColorStop(0, '#6baf8a');
      bodyGrad.addColorStop(1, '#4b8a6b');
    }
    ctx.beginPath();
    ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);
    ctx.fillStyle = bodyGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 家族色环
    const famColor = getFamilyColor(node);
    if (famColor) {
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.r + 3, 0, Math.PI * 2);
      ctx.strokeStyle = famColor;
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    // 名字
    ctx.font = 'bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const shortName = node.name.length > 4 ? node.name.substring(0, 4) + '…' : node.name;
    ctx.fillText(shortName, node.x, node.y - 2);

    // 家族标签（显示所有）
    const nodeFams = getNodeFamilies(node);
    if (nodeFams.length > 0) {
      ctx.font = '10px "PingFang SC","Microsoft YaHei",sans-serif';
      const displayFams = nodeFams.map(f => f.length > 4 ? f.substring(0, 4) + '…' : f).join('·');
      const famLabel = displayFams.length > 12 ? displayFams.substring(0, 12) + '…' : displayFams;
      ctx.fillStyle = famColor || 'rgba(255,255,255,0.7)';
      ctx.fillText(famLabel, node.x, node.y + 14);
    }
  });
}

function findNodeAt(mx, my) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = mx - n.x, dy = my - n.y;
    if (dx * dx + dy * dy <= n.r * n.r) return n;
  }
  return null;
}

function onMouseDown(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const node = findNodeAt(mx, my);
  if (node) {
    if (e.ctrlKey || e.metaKey) {
      // Ctrl+Click: add relation from this node
      selectedFromCharId = node.id;
      openCreateModal();
      return;
    }
    dragNode = node;
    dragOffX = mx - node.x;
    dragOffY = my - node.y;
    canvas.style.cursor = 'grabbing';
  } else {
    dragNode = null;
    // pan
    dragOffX = mx;
    dragOffY = my;
    canvas.style.cursor = 'grab';
  }
}

function onMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (dragNode) {
    dragNode.x = mx - dragOffX;
    dragNode.y = my - dragOffY;
    drawGraph();
    canvas.style.cursor = 'grabbing';
  } else if (dragNode === null && e.buttons > 0) {
    // 平移：直接偏移所有节点位置，不重新计算布局
    const pdx = mx - dragOffX;
    const pdy = my - dragOffY;
    nodes.forEach(n => { n.x += pdx; n.y += pdy; });
    offsetX += pdx;
    offsetY += pdy;
    dragOffX = mx;
    dragOffY = my;
    drawGraph();
    canvas.style.cursor = 'grabbing';
  } else {
    const node = findNodeAt(mx, my);
    canvas.style.cursor = node ? 'pointer' : 'default';
  }
}

function onMouseUp(e) {
  if (dragNode) {
    // 保存手动拖动后的位置
    pinnedPos.set(dragNode.id, { x: dragNode.x, y: dragNode.y });
    // 持久化到 localStorage
    const allPinned = {};
    pinnedPos.forEach((v, k) => { allPinned[k] = v; });
    localStorage.setItem('graphPinnedPos', JSON.stringify(allPinned));
    canvas.style.cursor = 'default';
    dragNode = null;
  } else if (dragNode === null) {
    dragNode = undefined; // reset
    canvas.style.cursor = 'default';
  }
}

function onWheel(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.3, Math.min(3, scale * delta));
  // 直接缩放节点坐标，不重新计算布局
  nodes.forEach(n => {
    n.x = mx + (n.x - mx) * delta;
    n.y = my + (n.y - my) * delta;
  });
  drawGraph();
}

// 双击节点查看角色
function onDblClick(e) {
  const rect = canvas.getBoundingClientRect();
  const node = findNodeAt(e.clientX - rect.left, e.clientY - rect.top);
  if (node) showCharInfo(node.id);
}

// --- 关系列表 ---
let draggedRelIndex = null;

function renderRelList() {
  const list = document.getElementById('relList');
  const empty = document.getElementById('emptyState');

  if (allRelations.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  // 搜索过滤
  const q = (document.getElementById('relSearchInput')?.value || '').trim().toLowerCase();
  let filtered = allRelations;
  if (q) {
    filtered = allRelations.filter(r => {
      const fromName = (r.from_name || '').toLowerCase();
      const toName = (r.to_name || '').toLowerCase();
      const type = (r.relation_type || '').toLowerCase();
      const desc = (r.description || '').toLowerCase();
      return fromName.includes(q) || toName.includes(q) ||
             type.includes(q) || desc.includes(q);
    });
  }

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    empty.querySelector('p').textContent = '没有匹配的关系';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = filtered.map((r, i) => {
    const fromName = r.from_name || '角色#' + r.from_char_id;
    const toName = r.to_name || '角色#' + r.to_char_id;
    const typeHtml = r.relation_type ? `<span class="rel-type ${r.relation_type === 'CP' ? 'rel-type-cp' : r.relation_type === '继承记忆' ? 'rel-type-memory' : r.relation_type === '参与组建' ? 'rel-type-formation' : r.relation_type === '师生' ? 'rel-type-teacher' : ''}">${esc(r.relation_type)}</span>` : '';
    const arrow = (r.relation_type === '朋友' || r.relation_type === '冤家' || r.relation_type === '亲属') ? '⇄' : '→';
    return `
      <div class="rel-item" id="rel-${r.id}" draggable="true" data-index="${i}"
           onmouseenter="highlightRelation(${r.id}, true)"
           onmouseleave="highlightRelation(${r.id}, false)"
           ondragstart="onRelDragStart(event, ${i})"
           ondragover="onRelDragOver(event)"
           ondragend="onRelDragEnd(event)"
           ondragenter="onRelDragEnter(event, this)"
           ondragleave="onRelDragLeave(event, this)"
           ondrop="onRelDrop(event, ${i})">
        <span class="drag-handle" title="拖动排序">⠿</span>
        <div class="rel-info" onclick="openEditModal(${r.id})">
          <div class="rel-names">
            ${esc(fromName)} <span class="arrow">${arrow}</span> ${esc(toName)}
            ${typeHtml}
          </div>
          ${r.description ? `<div class="rel-desc">${esc(r.description)}</div>` : ''}
        </div>
        <div class="rel-actions">
          <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openEditModal(${r.id})">编辑</button>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openDeleteModal(${r.id},'${esc(fromName)}${arrow}${esc(toName)}')">删除</button>
        </div>
      </div>`;
  }).join('');
}

function onRelDragStart(e, idx) {
  draggedRelIndex = idx;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
}

function onRelDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function onRelDragEnter(e, el) {
  e.preventDefault();
  if (!el.classList.contains('dragging')) el.classList.add('drag-over');
}

function onRelDragLeave(e, el) {
  el.classList.remove('drag-over');
}

function onRelDrop(e, toIdx) {
  e.preventDefault();
  e.target.closest('.rel-item')?.classList.remove('drag-over');
  if (draggedRelIndex === null || draggedRelIndex === toIdx) return;
  const item = allRelations.splice(draggedRelIndex, 1)[0];
  allRelations.splice(toIdx, 0, item);
  saveRelOrder();
  renderRelList();
  draggedRelIndex = null;
}

function onRelDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.rel-item').forEach(el => el.classList.remove('drag-over'));
  draggedRelIndex = null;
}

async function saveRelOrder() {
  const items = allRelations.map((r, i) => ({ id: r.id, sort_order: i }));
  try {
    await fetch(`${API_REL}/reorder`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items }),
    });
  } catch(e) { /* 静默失败 */ }
}

function highlightRelation(relId, on) {
  const edge = edges.find(e => e.id === relId);
  if (edge) {
    edge.highlight = on;
    if (on) {
      edge._origWidth = 3;
      edge._origAlpha = 0.7;
    }
    drawGraphWithHighlight();
  }
  const item = document.getElementById('rel-' + relId);
  if (item) item.classList.toggle('highlight', on);
}

function drawGraphWithHighlight() {
  ctx.clearRect(0, 0, cw, ch);

  // 背景网格
  ctx.strokeStyle = '#e8e0d5'; ctx.lineWidth = 0.5;
  for (let x = 40; x < cw; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ch); ctx.stroke(); }
  for (let y = 40; y < ch; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke(); }

  drawFamilyClusters();

  edges.forEach(edge => {
    const from = nodes.find(n => n.id === edge.from);
    const to = nodes.find(n => n.id === edge.to);
    if (!from || !to) return;

    const isBidirectional = ['CP', '朋友', '冤家', '亲属'].includes(edge.type);
    const hl = edge.highlight;
    drawEdge(from.x, from.y, to.x, to.y, edge.type, isBidirectional, hl);

    const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2;
    const label = edge.type;
    let labelColor;
    if (edge.type === 'CP') labelColor = '#c44b7a';
    else if (edge.type === '继承记忆') labelColor = '#2e8b8a';
    else if (edge.type === '参与组建') labelColor = '#d4842a';
    else if (edge.type === '师生') labelColor = '#4a7db0';
    else if (edge.type === '朋友') labelColor = '#2ecc71';
    else if (edge.type === '冤家') labelColor = '#e67e22';
    else if (edge.type === '亲属') labelColor = '#2ecc71';
    else labelColor = '#6b4c8a';
    const tw = ctx.measureText(label).width + 8;
    ctx.fillStyle = hl ? '#f0e8f8' : '#fff';
    ctx.fillRect(mx - tw/2, my - 9, tw, 18);
    ctx.strokeStyle = hl ? labelColor + '99' : labelColor + '55';
    ctx.lineWidth = 1;
    ctx.strokeRect(mx - tw/2, my - 9, tw, 18);
    ctx.fillStyle = labelColor;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, mx, my);
  });

  nodes.forEach(node => {
    const grad = ctx.createRadialGradient(node.x, node.y, node.r * 0.6, node.x, node.y, node.r + 6);
    if (node.gender === '男') { grad.addColorStop(0, 'rgba(107,76,138,0.4)'); grad.addColorStop(1, 'rgba(107,76,138,0)'); ctx.fillStyle = '#6b4c8a'; }
    else if (node.gender === '女') { grad.addColorStop(0, 'rgba(196,75,122,0.4)'); grad.addColorStop(1, 'rgba(196,75,122,0)'); ctx.fillStyle = '#c44b7a'; }
    else { grad.addColorStop(0, 'rgba(75,138,107,0.4)'); grad.addColorStop(1, 'rgba(75,138,107,0)'); ctx.fillStyle = '#4b8a6b'; }

    ctx.beginPath(); ctx.arc(node.x, node.y, node.r + 6, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill();

    const bodyGrad = ctx.createLinearGradient(node.x - node.r, node.y - node.r, node.x + node.r, node.y + node.r);
    if (node.gender === '男') { bodyGrad.addColorStop(0, '#8b6fc4'); bodyGrad.addColorStop(1, '#6b4c8a'); }
    else if (node.gender === '女') { bodyGrad.addColorStop(0, '#e07ba4'); bodyGrad.addColorStop(1, '#c44b7a'); }
    else { bodyGrad.addColorStop(0, '#6baf8a'); bodyGrad.addColorStop(1, '#4b8a6b'); }

    ctx.beginPath(); ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);
    ctx.fillStyle = bodyGrad; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.stroke();

    // 家族色环
    const famColor = getFamilyColor(node);
    if (famColor) {
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.r + 3, 0, Math.PI * 2);
      ctx.strokeStyle = famColor;
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    ctx.font = 'bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const shortName = node.name.length > 4 ? node.name.substring(0, 4) + '…' : node.name;
    ctx.fillText(shortName, node.x, node.y - 2);

    const nodeFams2 = getNodeFamilies(node);
    if (nodeFams2.length > 0) {
      ctx.font = '10px "PingFang SC","Microsoft YaHei",sans-serif';
      const displayFams = nodeFams2.map(f => f.length > 4 ? f.substring(0, 4) + '…' : f).join('·');
      const famLabel = displayFams.length > 12 ? displayFams.substring(0, 12) + '…' : displayFams;
      ctx.fillStyle = famColor || 'rgba(255,255,255,0.7)';
      ctx.fillText(famLabel, node.x, node.y + 14);
    }
  });
}

// --- Modal: 添加/编辑 ---
function populateCharSelects() {
  const fromSel = document.getElementById('fromChar');
  const toSel = document.getElementById('toChar');
  const opts = allCharacters.map(c => `<option value="${c.id}">${esc(c.name)}${c.university ? ' · ' + esc(c.university) : ''}</option>`).join('');
  fromSel.innerHTML = opts;
  toSel.innerHTML = opts;
  // 重置搜索输入
  document.getElementById('fromCharSearch').value = '';
  document.getElementById('toCharSearch').value = '';
  filterSelect({value:''}, 'fromChar');
  filterSelect({value:''}, 'toChar');
}

function filterSelect(input, selectId) {
  const sel = document.getElementById(selectId);
  const q = input.value.toLowerCase().trim();
  Array.from(sel.options).forEach(opt => {
    const text = opt.textContent.toLowerCase();
    opt.hidden = q && !text.includes(q);
  });
  // 如果只有一个匹配项且输入非空，自动选中
  const visible = Array.from(sel.options).filter(o => !o.hidden);
  if (q && visible.length === 1 && visible[0].textContent.toLowerCase().includes(q)) {
    sel.value = visible[0].value;
  }
}

function onCharSelect(sel, searchId) {
  // 选中后把角色名填入搜索框，显示所有选项
  const opt = sel.options[sel.selectedIndex];
  if (opt) document.getElementById(searchId).value = opt.textContent.split(' · ')[0];
  Array.from(sel.options).forEach(o => { o.hidden = false; });
}

function openCreateModal() {
  populateCharSelects();
  document.getElementById('modalTitle').textContent = '添加关系';
  document.getElementById('submitBtn').textContent = '确认添加';
  document.getElementById('editId').value = '';
  document.getElementById('relForm').reset();
  if (selectedFromCharId) {
    document.getElementById('fromChar').value = selectedFromCharId;
    const c = allCharacters.find(ch => ch.id === selectedFromCharId);
    if (c) document.getElementById('fromCharSearch').value = c.name;
  }
  document.getElementById('modalOverlay').classList.add('active');
}

function openEditModal(id) {
  // 从已加载的数据中查找，避免请求不存在的单条API
  const r = allRelations.find(rel => rel.id === id);
  if (!r) {
    showToast('未找到关系数据', 'error');
    return;
  }
  populateCharSelects();
  document.getElementById('modalTitle').textContent = '编辑关系';
  document.getElementById('submitBtn').textContent = '保存修改';
  document.getElementById('editId').value = r.id;
  document.getElementById('fromChar').value = r.from_char_id;
  document.getElementById('toChar').value = r.to_char_id;
  // 填入对应角色名称到搜索框
  const fromC = allCharacters.find(c => c.id === r.from_char_id);
  const toC = allCharacters.find(c => c.id === r.to_char_id);
  if (fromC) document.getElementById('fromCharSearch').value = fromC.name;
  if (toC) document.getElementById('toCharSearch').value = toC.name;
  document.getElementById('relType').value = r.relation_type || '';
  document.getElementById('relDesc').value = r.description || '';
  document.getElementById('modalOverlay').classList.add('active');
}

async function submitForm(e) {
  e.preventDefault();
  const form = document.getElementById('relForm');
  if (!form.checkValidity()) { form.reportValidity(); return; }

  const editId = document.getElementById('editId').value;
  const data = {
    from_char_id: parseInt(document.getElementById('fromChar').value),
    to_char_id: parseInt(document.getElementById('toChar').value),
    relation_type: document.getElementById('relType').value,
    description: document.getElementById('relDesc').value.trim(),
  };

  try {
    const url = editId ? `${API_REL}/${editId}` : API_REL;
    const method = editId ? 'PUT' : 'POST';
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || '操作失败'); }
    closeModal();
    selectedFromCharId = null;
    loadData();
    showToast(editId ? '关系已更新' : '关系已创建', 'success');
  } catch(e) {
    showToast(e.message || '操作失败', 'error');
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) { closeModal(); selectedFromCharId = null; }
});

// --- Toast ---
let toastTimer;
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + (type || '') + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 2500);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ====== 家族管理 ======
function openFamilyModal() {
  familyEditMap = {};
  allCharacters.forEach(c => {
    familyEditMap[c.id] = c.family || '';
  });

  // 收集已有家族作为建议（拆分后的单个家族名）
  const allFams = new Set();
  allCharacters.forEach(c => {
    const fams = splitFamilies(c.family || '');
    fams.forEach(f => allFams.add(f));
  });
  const datalistOpts = [...allFams].map(f => `<option value="${esc(f)}">`).join('');

  const body = document.getElementById('familyBody');
  body.innerHTML = allCharacters.map(c => {
    const fams = splitFamilies(c.family || '');
    const famDots = fams.map(f =>
      `<span class="legend-dot" style="background:${familyColorMap[f] || '#ccc'};border-color:${familyColorMap[f] || '#ccc'};flex-shrink:0;display:inline-block;margin-left:3px;" title="${esc(f)}"></span>`
    ).join('');
    return `
    <div class="form-group" style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
      <span style="min-width:90px;font-weight:600;font-size:.9rem;">${esc(c.name)}</span>
      <input type="text" class="fam-input" data-char-id="${c.id}" value="${esc(c.family || '')}"
             list="famSuggest_${c.id}" placeholder="多个用、分隔…"
             style="flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:.85rem;font-family:var(--font-sans);">
      <datalist id="famSuggest_${c.id}">${datalistOpts}</datalist>
      <span style="display:flex;gap:2px;flex-shrink:0;">${famDots}</span>
    </div>`;
  }).join('');

  // 绑定事件
  body.querySelectorAll('.fam-input').forEach(input => {
    input.addEventListener('input', function() {
      familyEditMap[parseInt(this.dataset.charId)] = this.value.trim();
    });
  });

  document.getElementById('familyOverlay').classList.add('active');
}

function closeFamilyModal() {
  document.getElementById('familyOverlay').classList.remove('active');
}

async function saveFamilies() {
  const toast = document.getElementById('toast');
  let successCount = 0;
  let failCount = 0;

  for (const charId in familyEditMap) {
    const newFamily = familyEditMap[charId].trim();
    const char = allCharacters.find(c => c.id === parseInt(charId));
    if (!char || (char.family || '').trim() === newFamily) continue;

    try {
      const res = await fetch(`${API_CHAR}/${charId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ family: newFamily }),
      });
      if (res.ok) {
        char.family = newFamily;
        successCount++;
      } else {
        failCount++;
      }
    } catch(e) {
      failCount++;
    }
  }

  closeFamilyModal();
  buildFamilyColors();
  updateFamilyLegend();
  computeLayout();
  drawGraph();
  showToast(`家族更新完成：${successCount} 成功 ${failCount > 0 ? failCount + ' 失败' : ''}`, failCount > 0 ? 'error' : 'success');
}

document.getElementById('familyOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeFamilyModal();
});

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed');}
</script>
